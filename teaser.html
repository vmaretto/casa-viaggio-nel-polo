<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Un viaggio in quattro mondi — il teaser</title>
<style>
  @font-face {
    font-family: "Cormorant CASA";
    src: url("assets/originale/CormorantGaramond-Regular.woff2") format("woff2");
    font-style: normal; font-weight: 300 700; font-display: swap;
  }
  @font-face {
    font-family: "Cormorant CASA";
    src: url("assets/originale/CormorantGaramond-Italic.woff2") format("woff2");
    font-style: italic; font-weight: 300 700; font-display: swap;
  }
  @font-face {
    font-family: "Outfit CASA";
    src: url("assets/originale/Outfit.woff2") format("woff2");
    font-style: normal; font-weight: 200 700; font-display: swap;
  }
  :root {
    --ink: #0f2b30;
    --ink-deep: #071d21;
    --paper: #f7f5ee;
    --muted: #b7c2bd;
    --food: #d8a94e;
    --environment: #7ebdae;
    --health: #d08b80;
    --agriculture: #aab322;
    --mix: #b4a967;
    --serif: "Cormorant CASA", Georgia, serif;
    --sans: "Outfit CASA", system-ui, sans-serif;
    --ease: cubic-bezier(.22, 1, .36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--ink-deep);
    color: var(--paper);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: fixed; inset: 0;
    background: radial-gradient(120vmax 120vmax at 50% 58%, #0d3038 0%, var(--ink-deep) 62%);
  }

  /* ---------- fase A · mondi separati che si attraggono ---------- */
  .parole { position: fixed; inset: 0; z-index: 10; }
  .parola {
    position: fixed; left: var(--x); top: var(--y);
    transform: translate(-50%, -50%);
    font-family: var(--serif); font-style: italic;
    font-size: clamp(34px, 5vw, 76px); color: var(--c);
    opacity: 0; white-space: nowrap;
    transition: opacity 1.1s var(--ease), left 2.2s var(--ease), top 2.2s var(--ease), transform 1.1s var(--ease);
    text-shadow: 0 0 34px color-mix(in srgb, var(--c), transparent 60%);
  }
  /* il pallino vive DENTRO la riga della parola: allineamento perfetto ovunque */
  .parola i {
    display: inline-block; width: .26em; height: .26em; border-radius: 50%;
    background: var(--c); vertical-align: middle; margin-right: .38em;
    transform: translateY(-.08em);
    box-shadow: 0 0 .55em .12em color-mix(in srgb, var(--c), transparent 45%);
  }
  .parola.on { opacity: 1; }
  /* su "smettono di essere mondi separati": le parole si attraggono verso il centro */
  .parole.tira .parola { left: var(--cx); top: var(--cy); }
  .parole.via .parola { opacity: 0; transform: translate(-50%, -50%) scale(.9); }

  /* ---------- fase B · la moltiplicazione (la chicca del film) ---------- */
  #tiles {
    position: fixed; inset: 0; z-index: 20; padding: 10px;
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(clamp(64px, 7vw, 110px), 1fr));
    grid-auto-rows: 1fr;
    pointer-events: none;
    transition: opacity 1.1s var(--ease), filter 1.1s var(--ease);
  }
  .tile {
    border-radius: 10px;
    background: color-mix(in srgb, var(--c), #071d21 14%);
    border: 1px solid color-mix(in srgb, var(--c), #f7f5ee 22%);
    opacity: 0; transform: scale(.15);
    transition: opacity .7s var(--ease) var(--d), transform .7s var(--ease) var(--d), background 1s ease;
  }
  #tiles.vivi .tile { opacity: 1; transform: scale(1); }
  #tiles.mix .tile { background: var(--mix); border-color: rgba(7,29,33,.28); transition: opacity .7s var(--ease), transform .7s var(--ease), background 1s ease; }
  #tiles.via { opacity: 0; filter: blur(6px); }
  #tiles.via .tile { transform: scale(.5); transition: transform 1.1s var(--ease); }

  /* ---------- pallini liberi (orbita e fila) ---------- */
  .dot {
    position: fixed; width: 16px; height: 16px; border-radius: 50%;
    background: var(--c); box-shadow: 0 0 18px 4px color-mix(in srgb, var(--c), transparent 45%);
    left: 50%; top: 20%; transform: translate(-50%, -50%) scale(0);
    opacity: 0; z-index: 30;
    transition: left 1.6s var(--ease), top 1.6s var(--ease), transform .9s var(--ease), opacity .9s var(--ease);
  }
  .dot--cibo        { --c: var(--food);        --a0: 0deg;   --fx: -36px; }
  .dot--ambiente    { --c: var(--environment); --a0: 90deg;  --fx: -12px; }
  .dot--salute      { --c: var(--health);      --a0: 180deg; --fx: 12px; }
  .dot--agricoltura { --c: var(--agriculture); --a0: 270deg; --fx: 36px; }
  @keyframes giro {
    from { transform: translate(-50%, -50%) rotate(var(--a0)) translateX(5.5vmin) rotate(calc(var(--a0) * -1)); }
    to   { transform: translate(-50%, -50%) rotate(calc(var(--a0) + 360deg)) translateX(5.5vmin) rotate(calc(-360deg - var(--a0))); }
  }
  body.orbita .dot { opacity: 1; animation: giro 7s linear infinite; }
  body.fila .dot {
    opacity: 1; animation: none;
    transform: translate(-50%, -50%) scale(1);
    left: calc(50% + var(--fx)); top: 80%;
  }

  /* ---------- fasi testuali ---------- */
  .fase {
    position: fixed; inset: 0; display: grid; place-items: center; z-index: 25;
    opacity: 0; visibility: hidden;
    transition: opacity 1s var(--ease), visibility 0s 1s;
  }
  .fase.on { opacity: 1; visibility: visible; transition: opacity 1s var(--ease); }

  .storia { text-align: center; padding: 0 6vw; }
  .storia p {
    margin: 0; font-family: var(--serif); font-style: italic;
    font-size: clamp(20px, 2vw, 30px); color: var(--muted);
    opacity: 0; transform: translateY(12px);
    transition: opacity 1s var(--ease), transform 1s var(--ease);
  }
  .storia h1 {
    margin: 2vh 0 0; font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: clamp(40px, 6vw, 96px); line-height: 1.12; letter-spacing: .01em;
    opacity: 0; transform: translateY(16px);
    transition: opacity 1.2s var(--ease), transform 1.2s var(--ease);
  }
  .storia .r2 { color: var(--muted); }
  .storia .on { opacity: 1; transform: none; }

  .invito { text-align: center; padding: 0 6vw; }
  .invito h2 {
    margin: 0; font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: clamp(38px, 5.6vw, 92px); line-height: 1.14;
    opacity: 0; transform: translateY(14px);
    transition: opacity 1.1s var(--ease), transform 1.1s var(--ease);
  }
  .invito h2.on { opacity: 1; transform: none; }
  .invito .cta {
    margin-top: 7vh; opacity: 0; transform: translateY(12px);
    transition: opacity 1.2s var(--ease) .2s, transform 1.2s var(--ease) .2s;
  }
  .invito .cta.on { opacity: 1; transform: none; }
  .invito a {
    display: inline-block; padding: 16px 34px; border: 1px solid color-mix(in srgb, var(--agriculture), transparent 35%);
    border-radius: 999px; color: var(--paper); text-decoration: none;
    font-family: var(--serif); font-style: italic; font-size: clamp(19px, 1.8vw, 27px);
    background: color-mix(in srgb, var(--agriculture), transparent 88%);
    transition: background .35s ease, transform .35s var(--ease);
  }
  .invito a:hover, .invito a:focus-visible { background: color-mix(in srgb, var(--agriculture), transparent 74%); transform: translateY(-2px); }
  .invito a:focus-visible { outline: 2px solid var(--paper); outline-offset: 4px; }
  .invito .dove {
    margin-top: 2.4vh; font-size: clamp(12px, 1.05vw, 15px);
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }

  /* ---------- schermata d'avvio ---------- */
  .porta {
    position: fixed; inset: 0; z-index: 60; display: grid; place-items: center;
    background: radial-gradient(120vmax 120vmax at 50% 58%, #0d3038 0%, var(--ink-deep) 62%);
    transition: opacity 1s var(--ease), visibility 0s 1s;
  }
  .porta.via { opacity: 0; visibility: hidden; }
  .porta__in { text-align: center; padding: 0 6vw; }
  .porta__dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 5vh; }
  .porta__dots i { width: 12px; height: 12px; border-radius: 50%; background: var(--c); box-shadow: 0 0 14px 2px color-mix(in srgb, var(--c), transparent 50%); }
  .porta h1 {
    margin: 0; font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: clamp(34px, 4.6vw, 72px); line-height: 1.16;
  }
  .porta button {
    margin-top: 6vh; padding: 16px 36px; cursor: pointer;
    border: 1px solid color-mix(in srgb, var(--agriculture), transparent 35%);
    border-radius: 999px; color: var(--paper);
    background: color-mix(in srgb, var(--agriculture), transparent 88%);
    font-family: var(--serif); font-style: italic; font-size: clamp(19px, 1.8vw, 26px);
    transition: background .35s ease, transform .35s var(--ease);
  }
  .porta button:hover, .porta button:focus-visible { background: color-mix(in srgb, var(--agriculture), transparent 74%); transform: translateY(-2px); }
  .porta button:focus-visible { outline: 2px solid var(--paper); outline-offset: 4px; }
  .porta .nota {
    margin-top: 2.6vh; font-size: clamp(12px, 1.05vw, 15px);
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }

  @media (prefers-reduced-motion: reduce) {
    .dot, .parola, .tile, #tiles, .storia p, .storia h1, .invito h2, .invito .cta { transition-duration: .01s; animation-duration: .01s; }
    body.orbita .dot { animation: none; opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>
<div class="stage" aria-hidden="true"></div>

<!-- fase A · quattro mondi separati: nascono lontani, poi si attraggono -->
<div class="parole" id="fParole" aria-hidden="true">
  <p class="parola" id="wCibo"        style="--c: var(--food);        --x: 20%; --y: 22%; --cx: 44%; --cy: 36%"><i></i>Cibo</p>
  <p class="parola" id="wAmbiente"    style="--c: var(--environment); --x: 77%; --y: 30%; --cx: 56%; --cy: 46%"><i></i>Ambiente</p>
  <p class="parola" id="wSalute"      style="--c: var(--health);      --x: 24%; --y: 72%; --cx: 45%; --cy: 57%"><i></i>Salute</p>
  <p class="parola" id="wAgricoltura" style="--c: var(--agriculture); --x: 74%; --y: 78%; --cx: 55%; --cy: 67%"><i></i>Agricoltura</p>
</div>

<!-- fase B · la moltiplicazione -->
<div id="tiles" aria-hidden="true"></div>

<!-- pallini liberi: orbita e fila finale -->
<span class="dot dot--cibo"></span>
<span class="dot dot--ambiente"></span>
<span class="dot dot--salute"></span>
<span class="dot dot--agricoltura"></span>

<!-- fase C · una storia sola -->
<div class="fase" id="fStoria">
  <div class="storia">
    <p id="sViaggio">Un viaggio di sei minuti.</p>
    <h1 id="sMondi">Quattro mondi.</h1>
    <h1 class="r2" id="sStoria">Una storia sola.</h1>
  </div>
</div>

<!-- fase D · l'invito -->
<div class="fase" id="fInvito">
  <div class="invito">
    <h2 id="iNome">Il nome?<br>Lo scoprirai alla fine.</h2>
    <div class="cta" id="iCta">
      <a href="cinema.html">▶&nbsp;&nbsp;Guarda il film · 6 minuti</a>
      <p class="dove">casa-viaggio-nel-polo.vercel.app</p>
    </div>
  </div>
</div>

<!-- avvio -->
<div class="porta" id="porta">
  <div class="porta__in">
    <div class="porta__dots" aria-hidden="true">
      <i style="--c: var(--food)"></i><i style="--c: var(--environment)"></i><i style="--c: var(--health)"></i><i style="--c: var(--agriculture)"></i>
    </div>
    <h1>Trenta secondi.<br>Poi vorrai vedere il resto.</h1>
    <button id="start" type="button">▶&nbsp;&nbsp;Parti</button>
    <p class="nota">Con audio · il teaser del viaggio</p>
  </div>
</div>

<audio id="voce" src="assets/audio/voce/teaser.mp3" preload="auto"></audio>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const voce = $('voce');
  const tiles = $('tiles');

  // Tessere: abbastanza da riempire lo schermo, colori distribuiti in modo pseudo-casuale
  // ma deterministico; l'attesa (--d) cresce a ondate sparse, come nel collage del film.
  const COLORI = ['var(--food)', 'var(--environment)', 'var(--health)', 'var(--agriculture)'];
  const N = 160;
  for (let i = 0; i < N; i++) {
    const t = document.createElement('span');
    t.className = 'tile';
    t.style.setProperty('--c', COLORI[(i * 7 + ((i / 4) | 0)) % 4]);
    const onda = (i * 37 + 11) % N;               // ordine sparso sullo schermo
    t.style.setProperty('--d', (onda * 24) + 'ms'); // ~3.8s per riempire tutto
    tiles.appendChild(t);
  }

  // Cue in secondi sull'audio — attacchi di frase misurati con silencedetect sul parlato reale:
  // P1 0→6.49 ("smettono" ~4.3) · P2 7.51→11.76 · "Un viaggio" 12.88 · "Quattro mondi" 14.61
  // "Una storia sola" 15.91 · "Il nome?" 18.28 · "Lo scoprirai" 19.65 · fine 20.82
  const CUES = [
    [1.3,  () => $('wCibo').classList.add('on')],
    [2.0,  () => $('wAmbiente').classList.add('on')],
    [2.7,  () => $('wSalute').classList.add('on')],
    [3.5,  () => $('wAgricoltura').classList.add('on')],
    [4.4,  () => $('fParole').classList.add('tira')],
    [7.4,  () => { $('fParole').classList.add('via'); tiles.classList.add('vivi'); }],
    [11.5, () => tiles.classList.add('mix')],
    [12.7, () => {
      tiles.classList.add('via');
      document.body.classList.add('orbita');
      $('fStoria').classList.add('on'); $('sViaggio').classList.add('on');
    }],
    [14.6, () => $('sMondi').classList.add('on')],
    [15.9, () => $('sStoria').classList.add('on')],
    [18.1, () => {
      $('fStoria').classList.remove('on');
      document.body.classList.remove('orbita');
      document.body.classList.add('fila');
      $('fInvito').classList.add('on'); $('iNome').classList.add('on');
    }],
  ];
  // la CTA scatta a fine audio (currentTime si ferma alla durata: un cue oltre non scatterebbe mai)
  voce.addEventListener('ended', () => setTimeout(() => $('iCta').classList.add('on'), 600));

  let prossimo = 0, avviato = false;
  const passo = () => {
    while (prossimo < CUES.length && voce.currentTime >= CUES[prossimo][0]) CUES[prossimo++][1]();
    if (prossimo < CUES.length || !voce.ended) requestAnimationFrame(passo);
  };

  $('start').addEventListener('click', () => {
    if (avviato) return; avviato = true;
    $('porta').classList.add('via');
    voce.play().catch(() => {});
    requestAnimationFrame(passo);
  });

  // ?demo: parte da solo senza audio (per verifiche automatiche)
  if (new URLSearchParams(location.search).has('demo')) {
    let t0 = null;
    $('porta').classList.add('via');
    const finto = ts => {
      if (t0 === null) t0 = ts;
      const s = (ts - t0) / 1000;
      while (prossimo < CUES.length && s >= CUES[prossimo][0]) CUES[prossimo++][1]();
      if (s >= 21.4) { $('iCta').classList.add('on'); return; }
      requestAnimationFrame(finto);
    };
    requestAnimationFrame(finto);
  }
})();
</script>
</body>
</html>
