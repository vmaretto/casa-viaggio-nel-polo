<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CASA — p14 · Direzione scientifica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#071d21;
    --ink-2:#0b262c;        /* ink schiarito per il duotone */
    --ink-3:#12333a;        /* luce del duotone */
    --paper:#f7f5ee;
    --acido:#aab322;
    --oro:#c9a35a;          /* oro istituzionale, distinto dal cibo */
    --oro-soft:rgba(201,163,90,.38);
    /* ambiti */
    --cibo:#d8a94e;
    --ambiente:#7ebdae;
    --salute:#d08b80;
    --agri:#aab322;
    --stage-w:min(1120px, 92vw);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:"Outfit",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* ===== SCENA 16:9, luce e vignettatura ===== */
  .scene{
    position:fixed; inset:0;
    display:grid; place-items:center;
    /* luce fredda alta a sinistra + vignettatura */
    background:
      radial-gradient(120% 90% at 22% 8%, rgba(126,189,174,.10), transparent 45%),
      radial-gradient(140% 120% at 78% 118%, rgba(0,0,0,.55), transparent 60%),
      var(--ink);
  }
  /* grana finissima per togliere il "piatto" (fermo-immagine ricco) */
  .scene::after{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .stage{
    position:relative;
    width:var(--stage-w);
    display:grid;
    grid-template-columns:minmax(280px,38%) 1fr;
    align-items:center;
    column-gap:clamp(40px,6vw,84px);
  }

  /* ===== TITOLO SCENA (overline in alto) ===== */
  .kicker{
    position:absolute; top:clamp(-16vh,-15vh,-118px); left:0;
    display:flex; align-items:baseline; gap:16px;
  }
  .kicker .tick{width:34px; height:1px; background:var(--oro-soft); transform:translateY(-6px)}
  .kicker h1{
    font-family:"Cormorant Garamond",serif;
    font-weight:500; font-style:italic;
    font-size:clamp(1.3rem,2.1vw,1.9rem);
    color:rgba(247,245,238,.82);
    letter-spacing:.2px; line-height:1;
  }

  /* ===== RITRATTO PLACEHOLDER (duotone + cornice doppio filo) ===== */
  .portrait-wrap{ display:grid; place-items:center; }
  .portrait{
    position:relative;
    width:clamp(220px,26vw,336px);
    aspect-ratio:1/1; border-radius:50%;
    overflow:hidden;
    /* DUOTONE placeholder: ink profondo -> luce fredda, con silhouette astratta */
    background:
      radial-gradient(75% 62% at 50% 118%, rgba(201,163,90,.16), transparent 60%),           /* alito d'oro dal basso */
      radial-gradient(46% 40% at 50% 40%, var(--ink-3) 0%, var(--ink-2) 55%, var(--ink) 100%),/* massa "testa/spalle" */
      linear-gradient(150deg, #10303700 0%, var(--ink) 100%);
    box-shadow:
      inset 0 2px 18px rgba(0,0,0,.45),
      inset 0 -30px 60px rgba(0,0,0,.35);
  }
  /* quando entrerà la FOTO vera: <img> con questo trattamento duotone */
  .portrait img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    filter:grayscale(1) contrast(1.04) brightness(1.02);
  }
  /* strato duotone (ombre=ink, luci=oro) che regge anche sulla foto */
  .portrait::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(155deg, rgba(18,51,58,.65), rgba(7,29,33,.92));
    mix-blend-mode:multiply;
  }
  .portrait::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(60% 55% at 42% 30%, rgba(201,163,90,.28), transparent 62%);
    mix-blend-mode:screen;
  }

  /* CORNICE: anello sottile oro istituzionale, DOPPIO FILO */
  .frame{ position:relative; }
  .frame::before,.frame::after{ content:""; position:absolute; border-radius:50%; pointer-events:none; }
  .frame::before{                     /* filo interno a contatto del ritratto */
    inset:-1px;
    box-shadow:0 0 0 1px rgba(201,163,90,.9), 0 34px 70px -28px rgba(0,0,0,.7);
  }
  .frame::after{                      /* stacco + filo esterno sottile */
    inset:-11px;
    box-shadow:0 0 0 1px var(--oro-soft);
  }

  /* ===== BLOCCO TIPOGRAFICO ===== */
  .id{ max-width:40ch; }
  .role-top{
    font-size:.72rem; font-weight:500; letter-spacing:.34em; text-transform:uppercase;
    color:rgba(247,245,238,.55); margin-bottom:14px;
  }
  .name{
    font-family:"Cormorant Garamond",serif;
    font-weight:600; line-height:.98;
    font-size:clamp(2.1rem,4.4vw,3.5rem);
    color:var(--paper);
  }
  .name .pref{ font-weight:400; font-style:italic; color:rgba(247,245,238,.6);
    font-size:.5em; letter-spacing:.02em; }

  /* ---- CREDENZIALE NOBEL: l'asset, reso grande e autorevole ---- */
  .nobel{
    margin-top:clamp(22px,3vh,34px);
    padding:clamp(16px,2.4vh,26px) 0;
    border-top:1px solid var(--oro-soft);
    border-bottom:1px solid var(--oro-soft);
    display:grid; grid-template-columns:1fr auto; align-items:center; gap:24px;
  }
  .nobel .label{
    font-size:.66rem; font-weight:600; letter-spacing:.4em; text-transform:uppercase;
    color:rgba(201,163,90,.85); margin-bottom:10px;
  }
  .nobel .title{
    font-family:"Cormorant Garamond",serif; font-weight:500;
    font-size:clamp(1.9rem,3.4vw,3rem); line-height:.98;
    letter-spacing:.01em; color:var(--oro);
  }
  .nobel .year{
    font-family:"Cormorant Garamond",serif; font-weight:500; font-style:italic;
    font-size:clamp(3.4rem,7vw,6rem); line-height:.8;
    color:var(--oro); opacity:.9;
    text-align:right; letter-spacing:-.01em;
  }

  .subrole{
    margin-top:20px;
    font-size:.8rem; font-weight:500; letter-spacing:.26em; text-transform:uppercase;
    color:rgba(247,245,238,.72);
  }
  .context{
    margin-top:18px; max-width:38ch;
    font-family:"Cormorant Garamond",serif; font-style:italic; font-weight:400;
    font-size:clamp(1.02rem,1.5vw,1.24rem); line-height:1.5;
    color:rgba(247,245,238,.62);
  }

  /* ===== 4 PALLINI-FIRMA (eco "quattro ambiti") ===== */
  .dots{
    position:absolute; bottom:clamp(-14vh,-13vh,-104px); left:0;
    display:flex; align-items:center; gap:13px;
  }
  .dots i{ width:9px; height:9px; border-radius:50%; display:block; }
  .dots .d1{ background:var(--cibo); }
  .dots .d2{ background:var(--ambiente); }
  .dots .d3{ background:var(--salute); }
  .dots .d4{ background:var(--agri); box-shadow:0 0 0 4px rgba(170,179,34,.12); }

  /* ===== ENTRATA A STEP (stato finale = fermo-immagine completo) ===== */
  @media (prefers-reduced-motion:no-preference){
    .anim{ opacity:0; transform:translateY(12px); animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards; }
    .frame.anim{ transform:scale(.965); animation:pop .7s cubic-bezier(.2,.7,.2,1) forwards; }
    .kicker{ animation-delay:.05s }
    .frame{ animation-delay:.20s }
    .id .name{ animation-delay:.42s }
    .id .role-top{ animation-delay:.36s }
    .nobel{ animation-delay:.62s }
    .subrole{ animation-delay:.80s }
    .context{ animation-delay:.92s }
    .dots{ animation-delay:1.02s }
    @keyframes rise{ to{opacity:1; transform:none} }
    @keyframes pop{ to{opacity:1; transform:scale(1)} }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="stage">

      <div class="kicker anim">
        <span class="tick"></span>
        <h1>Un presidio comune ai quattro ambiti.</h1>
      </div>

      <div class="portrait-wrap">
        <div class="frame anim">
          <div class="portrait has-photo">
            <img src="assets/cinematic/valentini.jpg" alt="Prof. Riccardo Valentini" style="object-position:37% 30%">
          </div>
        </div>
      </div>

      <div class="id">
        <div class="name anim"><span class="pref">Prof.</span> Riccardo Valentini</div>

        <div class="nobel anim">
          <div>
            <div class="label">Premio</div>
            <div class="title">Nobel per la Pace</div>
          </div>
          <div class="year">2007</div>
        </div>

        <div class="subrole anim">Direzione scientifica di CASA</div>
        <p class="context anim">La sua esperienza internazionale su clima ed ecosistemi guida l'integrazione dei quattro ambiti.</p>
      </div>

      <div class="dots anim">
        <i class="d1"></i><i class="d2"></i><i class="d3"></i><i class="d4"></i>
      </div>

    </div>
  </div>
</body>
</html>
