<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROVA · P13 — Tre orizzonti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#071d21; --paper:#f7f5ee; --acid:#aab322;
    --food:#d8a94e; --env:#7ebdae; --health:#d08b80; --agr:#aab322;
    --serif:"Cormorant Garamond",serif; --sans:"Outfit",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; overflow:hidden; color:var(--paper); font-family:var(--sans); background:var(--ink);}

  /* cielo notturno + terra: stesso mondo della casa */
  #sky{position:fixed; inset:0;
    background:
      radial-gradient(38vw 26vh at 76% 46%, rgba(170,179,34,.16), transparent 62%),   /* la luce della meta */
      radial-gradient(ellipse 140vw 120vh at 50% 26%, #082126 30%, #04151a 100%);}
  #ground{position:fixed; left:0; right:0; top:60vh; bottom:0;
    background:linear-gradient(180deg,#04171a,#020d0d 72%);}
  #horizon{position:fixed; left:0; right:0; top:60vh; height:1px;
    background:linear-gradient(90deg,transparent,rgba(247,245,238,.10) 22%,rgba(170,179,34,.34) 76%,rgba(247,245,238,.06) 92%,transparent);}

  /* la strada che si allontana verso la luce */
  #road{position:fixed; inset:0; width:100vw; height:100vh;}

  .kick{position:fixed; top:8vh; left:8vw; font-size:clamp(11px,.9vw,13px); font-weight:600;
    letter-spacing:.28em; text-transform:uppercase; color:var(--acid);}
  .title{position:fixed; top:11.5vh; left:8vw; max-width:34vw; margin:0;
    font-family:var(--serif); font-weight:500; font-size:clamp(24px,3vw,42px); line-height:1.08; color:var(--paper);}
  .title .b{color:var(--acid);}

  /* tappe: si rimpiccioliscono e si schiariscono allontanandosi */
  .stop{position:fixed; transform:translateX(-50%); text-align:center;}
  .stop .yr{font-family:var(--serif); font-weight:600; line-height:.92; color:var(--paper);}
  .stop .vb{margin-top:.8vh; font-family:var(--serif); font-style:italic; color:var(--acid);}
  .stop .ln{margin-top:.7vh; font-weight:300; color:rgba(247,245,238,.62); letter-spacing:.01em;}
  .stop .pin{width:9px; height:9px; margin:1.4vh auto 0; border-radius:50%; background:var(--acid); box-shadow:0 0 14px rgba(170,179,34,.6);}

  /* vicino → lontano */
  .s1{left:17%;  bottom:15vh;}
  .s1 .yr{font-size:clamp(46px,5.4vw,84px);} .s1 .vb{font-size:clamp(19px,2vw,30px);} .s1 .ln{font-size:clamp(13px,1vw,16px); max-width:20vw;}
  .s2{left:48%;  bottom:29vh; opacity:.9;}
  .s2 .yr{font-size:clamp(34px,3.9vw,60px);} .s2 .vb{font-size:clamp(16px,1.6vw,24px);} .s2 .ln{font-size:clamp(12px,.9vw,14px); max-width:17vw;}
  .s3{left:76%;  bottom:39.5vh; opacity:.82;}
  .s3 .yr{font-size:clamp(24px,2.8vw,42px);} .s3 .vb{font-size:clamp(13px,1.3vw,19px);} .s3 .ln{font-size:clamp(11px,.82vw,13px); max-width:15vw;}
  .s3 .pin{width:12px;height:12px;box-shadow:0 0 26px rgba(170,179,34,.85), 0 0 60px rgba(170,179,34,.4);}

  .chiusa{position:fixed; bottom:7vh; left:50%; transform:translateX(-50%);
    font-family:var(--serif); font-style:italic; font-weight:500;
    font-size:clamp(19px,2.1vw,30px); color:var(--paper); opacity:.9; white-space:nowrap;}

  .sig{position:fixed; bottom:3.2vh; left:50%; transform:translateX(-50%); display:flex; gap:18px;}
  .sig i{width:9px; height:9px; border-radius:50%; background:var(--c); box-shadow:0 0 8px var(--c);}

  /* entrata */
  .kick,.title,.stop,.chiusa,.sig i{opacity:0; transform:translateY(10px);}
  .stop{transform:translateX(-50%) translateY(10px);}
  body.in .kick,body.in .title,body.in .chiusa,body.in .sig i{opacity:1; transform:none; transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);}
  body.in .stop{transform:translateX(-50%); transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1);}
  body.in .s1{opacity:1; transition-delay:.6s;}
  body.in .s2{opacity:.9; transition-delay:1.15s;}
  body.in .s3{opacity:.82; transition-delay:1.7s;}
  body.in .title{transition-delay:.1s;}
  body.in .chiusa{transition-delay:2.3s;}
  body.in .sig i:nth-child(1){transition-delay:2.5s;} body.in .sig i:nth-child(2){transition-delay:2.6s;}
  body.in .sig i:nth-child(3){transition-delay:2.7s;} body.in .sig i:nth-child(4){transition-delay:2.8s;}
  #roadline{opacity:0; transition:opacity 1.6s ease .3s;}
  body.in #roadline{opacity:1;}
</style>
</head>
<body>
  <div id="sky"></div>
  <div id="ground"></div>
  <div id="horizon"></div>

  <svg id="road" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="rd" gradientUnits="userSpaceOnUse" x1="8" y1="86" x2="80" y2="60">
        <stop offset="0" stop-color="rgba(247,245,238,.10)"></stop>
        <stop offset=".62" stop-color="rgba(170,179,34,.45)"></stop>
        <stop offset="1" stop-color="rgba(234,242,154,.95)"></stop>
      </linearGradient>
    </defs>
    <!-- la strada: si stringe allontanandosi (prospettiva) -->
    <path d="M 2,92 C 24,88 40,76 56,69 S 72,63 79,60.4" fill="none" stroke="url(#rd)"
      stroke-width="2.4" stroke-linecap="round" vector-effect="non-scaling-stroke" id="roadline"></path>
  </svg>

  <p class="kick">Roadmap</p>
  <h2 class="title">Costruire. Attivare. Verificare. <span class="b">Poi estendere.</span></h2>

  <div class="stop s1">
    <div class="yr">2026</div>
    <div class="vb">Fondare</div>
    <div class="ln">Spazio, governance e risorse.</div>
    <div class="pin"></div>
  </div>
  <div class="stop s2">
    <div class="yr">2027</div>
    <div class="vb">Attivare</div>
    <div class="ln">Il luogo e il primo ciclo operativo.</div>
    <div class="pin"></div>
  </div>
  <div class="stop s3">
    <div class="yr">2028–2030</div>
    <div class="vb">Verificare, poi estendere</div>
    <div class="ln">Risultati prima della replica.</div>
    <div class="pin"></div>
  </div>

  <p class="chiusa">Prima si costruisce. Poi si prova. Solo dopo si scala.</p>
  <div class="sig">
    <i style="--c:var(--food)"></i><i style="--c:var(--env)"></i><i style="--c:var(--health)"></i><i style="--c:var(--agr)"></i>
  </div>
<script>requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.add('in')));</script>
</body>
</html>
