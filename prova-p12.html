<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROVA · P12 — La casa di notte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #071d21;
    --paper: #f7f5ee;
    --acid: #aab322;
    --serif: "Cormorant Garamond", serif;
    --sans: "Outfit", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; overflow: hidden; background: var(--ink); font-family: var(--sans); color: var(--paper); }

  /* ---- cielo e terra: il buio ha una geografia ---- */
  #sky {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 120vw 70vh at 50% 88%, rgba(126,189,174,.075), transparent 60%),
      radial-gradient(ellipse 140vw 120vh at 50% 30%, #082126 30%, #04151a 100%);
  }
  #ground {
    position: fixed; left: 0; right: 0; top: 78vh; bottom: 0;
    background: linear-gradient(180deg, #03130f, #020d0d 70%);
  }
  #ground::before { /* linea d'orizzonte appena percettibile */
    content: ""; position: absolute; left: 12%; right: 12%; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(247,245,238,.07) 30%, rgba(247,245,238,.07) 70%, transparent);
  }

  /* ---- la casa: una sagoma scura contro il cielo ---- */
  #house { position: fixed; inset: 0; width: 100vw; height: 100vh; }

  /* ---- finestre (solo luce: il testo sta fuori dal vetro) ---- */
  .win {
    position: fixed; transform: translate(-50%, -50%);
    border-radius: 2px;
    opacity: 0;
  }
  .win .glass {
    position: absolute; inset: 0; border-radius: 2px;
    background: radial-gradient(130% 140% at 30% 80%,
      rgba(244,229,193,.97) 0%, rgba(232,212,154,.9) 52%, rgba(206,180,120,.22) 100%);
    box-shadow: inset 0 0 3px 1.5px rgba(4,16,18,.75);
  }
  .win .ceiling {
    position: absolute; inset: 0; border-radius: 2px;
    background: linear-gradient(180deg, rgba(7,29,33,.5), transparent 48%);
  }
  .win .mullion-v { position: absolute; top: 0; bottom: 0; left: 48%; width: 1.5px; background: rgba(4,16,18,.65); }
  .win .mullion-h { position: absolute; left: 0; right: 0; top: 44%; height: 1.5px; background: rgba(4,16,18,.55); }
  .win .halo {
    position: absolute; inset: -1px; border-radius: 3px;
    box-shadow: 0 0 2.6vw var(--halo1), 0 1.2vh 7vw var(--halo2);
  }
  /* la luce cade sulla facciata sotto la finestra */
  .win .spill {
    position: absolute; top: 100%; left: 50%;
    width: 190%; height: 340%;
    transform: translateX(-50%);
    background: radial-gradient(50% 100% at 50% 0%, var(--spill), transparent 75%);
    pointer-events: none;
  }

  /* pozza di luce sul terreno (solo piano terra) */
  .pool {
    position: fixed; transform: translate(-50%, 0);
    width: 13vw; height: 2.2vh; border-radius: 50%;
    background: radial-gradient(closest-side, var(--c), transparent);
    filter: blur(9px);
    opacity: 0; transition: opacity .8s ease;
  }

  /* ---- etichette: piccole, fuori dal vetro, sulla massa scura ---- */
  .tag {
    position: fixed; transform: translate(-50%, 0);
    width: max-content; max-width: 16vw;
    text-align: center;
    opacity: 0;
    transition: opacity .7s ease .25s;
  }
  .tag .name {
    font-family: var(--sans); font-weight: 500;
    font-size: clamp(.68rem, .85vw, .92rem);
    letter-spacing: .14em; text-transform: uppercase;
    color: rgba(247,245,238,.85);
  }
  .tag .keys {
    margin-top: .5vh;
    font-family: var(--sans); font-weight: 300;
    font-size: clamp(.55rem, .68vw, .72rem);
    letter-spacing: .06em;
    color: rgba(247,245,238,.42);
    white-space: nowrap;
  }
  .tag.on { opacity: 1; }

  #fx { position: fixed; inset: 0; pointer-events: none; }

  /* ---- testi ---- */
  #titolo {
    position: fixed; top: 7.5vh; left: 50%;
    transform: translateX(-50%) translateY(1.5vh);
    width: min(84vw, 980px); text-align: center;
    font-weight: 500; font-size: clamp(1rem, 1.75vw, 1.45rem);
    letter-spacing: .06em; opacity: 0;
    transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
  }
  #titolo.on { opacity: 1; transform: translateX(-50%); }
  #titolo.dim { opacity: .5; transition: opacity 1s ease; }
  #titolo strong { color: var(--acid); font-weight: 600; }

  #word {
    position: fixed; top: 40vh; left: 50%;
    transform: translate(-50%, -50%);
    width: 96vw; text-align: center; pointer-events: none;
  }
  #word .big {
    font-family: var(--serif); font-weight: 600; color: var(--paper);
    font-size: clamp(3.2rem, 9.5vw, 8.4rem);
    line-height: .95; letter-spacing: .02em;
    text-shadow: 0 0 80px rgba(247,245,238,.12);
  }
  #word .big.two { font-size: clamp(2.4rem, 6.6vw, 5.9rem); }
  #word .sub {
    margin-top: 1.6vh; font-weight: 300;
    font-size: clamp(.85rem, 1.35vw, 1.1rem);
    letter-spacing: .22em; text-transform: uppercase;
  }

  #chiusa {
    position: fixed; top: 87.5vh; left: 50%;
    transform: translateX(-50%);
    width: min(86vw, 1000px); text-align: center;
    font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: clamp(1.5rem, 2.9vw, 2.4rem);
  }
  #chiusa span { opacity: 0; transition: opacity .5s cubic-bezier(.22,1,.36,1); display: inline-block; }
  #chiusa .p2 { transform: translateY(1vh); transition: opacity .5s cubic-bezier(.22,1,.36,1), transform .5s cubic-bezier(.22,1,.36,1); }
  #chiusa.s1 .p1 { opacity: 1; }
  #chiusa.s2 .p2 { opacity: 1; transform: none; }
  #chiusa em {
    font-style: italic;
    text-decoration: underline;
    text-decoration-color: var(--acid);
    text-decoration-thickness: 1px;
    text-underline-offset: .35em;
  }
  #replay {
    position: fixed; right: 18px; bottom: 14px; z-index: 40;
    padding: 6px 14px; border: 1px solid rgba(247,245,238,.22); border-radius: 99px;
    background: none; color: rgba(247,245,238,.55);
    font-family: var(--sans); font-size: 12px; letter-spacing: .08em; cursor: pointer;
  }
</style>
</head>
<body>
<div id="sky"></div>
<div id="ground"></div>

<svg id="house" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <linearGradient id="wallg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#030e10"></stop>
      <stop offset="1" stop-color="#020a09"></stop>
    </linearGradient>
  </defs>
  <!-- massa: falda lunga a sinistra, corpo alto a destra, comignolo -->
  <path id="mass" d="M 28 78
    L 28 47 L 47 30 L 58 30 L 58 26.5 L 61.5 26.5 L 61.5 30 L 66 30
    L 72 36 L 72 78 Z" fill="url(#wallg)"></path>
  <!-- il colmo e le falde prendono la luna: il bordo che disegna la casa -->
  <path id="rimL" d="M 28 47 L 47 30" fill="none" stroke="rgba(247,245,238,.30)" stroke-linejoin="round"
    vector-effect="non-scaling-stroke" style="stroke-width:1.8px"></path>
  <path id="rim" d="M 47 30 L 58 30 L 58 26.5 L 61.5 26.5 L 61.5 30 L 66 30 L 72 36"
    fill="none" stroke="rgba(247,245,238,.13)" stroke-width=".22" stroke-linejoin="round"
    vector-effect="non-scaling-stroke" style="stroke-width:1.5px"></path>
  <!-- spigoli laterali, appena -->
  <path d="M 28 47 L 28 78 M 72 36 L 72 78" fill="none" stroke="rgba(247,245,238,.06)"
    vector-effect="non-scaling-stroke" style="stroke-width:1px"></path>
  <!-- la porta: scura, socchiusa di luce calda -->
  <rect x="48.6" y="69.5" width="2.8" height="8.5" fill="#061c1d"></rect>
  <rect x="48.75" y="69.65" width="2.5" height="8.35" fill="#03120f"></rect>
  <ellipse id="doorglow" cx="51.1" cy="73.8" rx="1.6" ry="4.6" fill="#d8a94e" opacity="0" style="filter: blur(6px)"></ellipse>
  <rect id="doorlight" x="51.0" y="69.65" width=".4" height="8.35" fill="#e9c27a" opacity="0"></rect>
</svg>

<canvas id="fx"></canvas>

<p id="titolo"><strong>CASA</strong> parte da capacità reali, non da una pagina bianca.</p>
<div id="word" hidden><div class="big"></div><div class="sub"></div></div>
<p id="chiusa"><span class="p1">La casa…</span> <span class="p2">è <em>già arredata</em>.</span></p>
<button id="replay" type="button">↺ rivedi</button>

<script>
(() => {
  'use strict';
  const qs = new URLSearchParams(location.search);
  const TABLEAU = qs.has('tableau');

  const rgba = (hex, a) => {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  };
  const tint = (hex, p) => {
    const n = parseInt(hex.slice(1), 16);
    const w = [232, 200, 130];
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    const h = c => Math.round(c).toString(16).padStart(2, '0');
    return '#' + h(w[0] + (r - w[0]) * p) + h(w[1] + (g - w[1]) * p) + h(w[2] + (b - w[2]) * p);
  };
  const mixWarm = (hex, p) => {
    const n = parseInt(hex.slice(1), 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    const base = [255, 243, 210];
    return `rgba(${Math.round(base[0] + (r - base[0]) * p)},${Math.round(base[1] + (g - base[1]) * p)},${Math.round(base[2] + (b - base[2]) * p)},.96)`;
  };

  // Finestre dentro la sagoma (coordinate in vw/vh dello schermo).
  // Piano alto piccolo e discreto, piano terra più generoso. Asimmetrie deliberate.
  const WINS = [
    { k: 'A', name: 'Formazione', keys: 'carbon farming · digitale · competenze ibride', c: '#aab322', x: 40.5, y: 51, w: 4.6, h: 7, peak: .9, tagY: 57.2, up: true },
    { k: 'B', name: 'Capacità scientifiche', keys: 'dati · clima · agricoltura · cibo · salute', c: '#7ebdae', x: 60.5, y: 50, w: 4.6, h: 7, peak: .9, tagY: 56.2, up: true },
    { k: 'C', name: 'Esperienza operativa', keys: 'sperimentazione · ricerca · open innovation', c: '#d8a94e', x: 38.5, y: 66.5, w: 5.4, h: 8.4, peak: 1, tagY: 72.6 },
    { k: 'D', name: 'Relazioni', keys: 'università · imprese · ricerca · territori', c: '#d08b80', x: 62.5, y: 66, w: 6.6, h: 8.8, peak: 1, tagY: 72.3 },
  ];
  const BEATS = [
    { at: 2.6, win: 'C', word: ['ESPERIENZA'], sub: 'sperimentazione · ricerca · open innovation' },
    { at: 4.8, win: 'B', word: ['CAPACITÀ', 'SCIENTIFICHE'], sub: 'dati · clima · agricoltura · cibo · salute' },
    { at: 6.9, win: 'A', word: ['FORMAZIONE'], sub: 'carbon farming · digitale · competenze ibride' },
    { at: 9.0, win: 'D', word: ['RELAZIONI'], sub: 'università · imprese · ricerca · territori' },
  ];

  const els = {};
  for (const w of WINS) {
    const div = document.createElement('div');
    div.className = 'win';
    div.style.cssText = `left:${w.x}vw; top:${w.y}vh; width:${w.w}vw; height:${w.h}vh;` +
      `--halo1:${rgba(tint(w.c, .35), .26)}; --halo2:${rgba(tint(w.c, .35), .09)};` +
      `--spill:rgba(232,200,130,.07);`;
    div.innerHTML = `<div class="halo"></div><div class="spill"></div><div class="glass"></div><div class="ceiling"></div><div class="mullion-v"></div><div class="mullion-h"></div>`;
    document.body.appendChild(div);

    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.style.cssText = `left:${w.x}vw; top:${w.tagY}vh;`;
    tag.innerHTML = `<div class="name">${w.name}</div><div class="keys">${w.keys}</div>`;
    document.body.appendChild(tag);

    let pool = null;
    if (!w.up) {
      pool = document.createElement('div');
      pool.className = 'pool';
      pool.style.cssText = `left:${w.x}vw; top:${78.4}vh; --c:rgba(232,200,130,.28);`;
      document.body.appendChild(pool);
    }
    els[w.k] = { div, tag, pool, cfg: w, lit: false, level: 0, peakLevel: 0 };
  }

  const doorPool = document.createElement('div');
  doorPool.className = 'pool';
  doorPool.style.cssText = 'left:50vw; top:78.2vh; width:19vw; height:3vh; --c:rgba(216,169,78,.5); filter: blur(11px);';
  document.body.appendChild(doorPool);
  const titolo = document.getElementById('titolo');
  const word = document.getElementById('word');
  const chiusa = document.getElementById('chiusa');
  const doorlight = document.getElementById('doorlight');

  /* ---------- canvas: pallini con scie + pulviscolo nei coni ---------- */
  const cv = document.getElementById('fx');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0;
  const fit = () => {
    const dpr = Math.min(2, devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  fit(); addEventListener('resize', fit, { passive: true });
  const vw = v => v * W / 100, vh = v => v * H / 100;

  const DOTC = ['#d8a94e', '#7ebdae', '#d08b80', '#aab322'];
  const DOT_BEAT = [0, 1, 3, 2];
  const dots = DOTC.map((c, i) => ({
    c, i, x: -vw(6) - i * vw(2.2), y: vh(84), trail: [], state: 'enter', t0: 0,
  }));

  const sillPos = k => {
    const c = els[k].cfg;
    return { x: vw(c.x) - vw(c.w) / 2 + vw(.7), y: vh(c.y) + vh(c.h) / 2 - vh(.8) };
  };

  const dust = [];
  const mk = (n, r0, r1, dr, a) => { for (let i = 0; i < n; i++) dust.push({ x: Math.random() * W, y: Math.random() * H, r: r0 + Math.random() * (r1 - r0), dr, a, ph: Math.random() * 7 }); };
  mk(40, .5, .8, 2, .04); mk(28, .8, 1.5, 4, .07); mk(12, 1.5, 2.5, 7, .10);

  const inCone = p => {
    for (const k in els) {
      const e = els[k];
      if (e.level < .2) continue;
      const c = e.cfg;
      const sill = vh(c.y + c.h / 2);
      const dy = p.y - sill;
      if (dy < 0 || dy > vh(16)) continue;
      const half = vw(c.w) / 2 * (1 + .9 * dy / vh(16));
      if (Math.abs(p.x - vw(c.x)) < half) return [e.level, c.c];
    }
    return [0, null];
  };

  let start = performance.now();

  const qbez = (p0, p1, p2, t) => {
    const u = 1 - t;
    return { x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x, y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y };
  };

  const drawDot = (d, now) => {
    d.trail.push({ x: d.x, y: d.y });
    if (d.trail.length > 14) d.trail.shift();
    d.trail.forEach((p, j) => {
      const f = j / d.trail.length;
      ctx.globalAlpha = f * .5;
      ctx.fillStyle = d.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, vw(.75) / 2 * (.15 + .85 * f), 0, 7); ctx.fill();
    });
    const breath = 1 + .06 * Math.sin(now / 1000 * 2 + d.i * .6);
    ctx.globalAlpha = 1;
    ctx.shadowColor = d.c; ctx.shadowBlur = 8;
    ctx.fillStyle = d.c;
    ctx.beginPath(); ctx.arc(d.x, d.y, vw(.75) / 2 * breath, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
  };

  const frame = now => {
    const t = (now - start) / 1000;
    ctx.clearRect(0, 0, W, H);

    for (const p of dust) {
      p.y -= p.dr / 60;
      p.x += Math.sin(now / 1000 * .3 + p.ph) * .05;
      if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
      const [lit, col] = inCone(p);
      ctx.globalAlpha = p.a * (.4 + .6 * lit);
      ctx.fillStyle = lit && col ? col : '#f7f5ee';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const d of dots) {
      if (d.state === 'enter') {
        const k = Math.min(1, t / .9);
        const e = 1 - Math.pow(1 - k, 3);
        const targetX = vw(50) + (d.i - 1.5) * vw(2.4);
        d.x = -vw(6) + (targetX + vw(6)) * e - d.i * vw(1.2) * (1 - e);
        d.y = vh(84);
        if (k >= 1) d.state = 'idle';
        drawDot(d, now);
      } else if (d.state === 'idle') {
        d.y = vh(84) + Math.sin(now / 1000 * 1.2 + d.i) * vh(.35);
        drawDot(d, now);
      } else if (d.state === 'fly') {
        const k = Math.min(1, (now - d.t0) / 700);
        const e = k * k * (3 - 2 * k);
        const p = qbez(d.p0, d.pc, d.p1, e);
        d.x = p.x; d.y = p.y;
        drawDot(d, now);
        if (k >= 1) d.state = 'lamp';
      } else if (d.state === 'lamp') {
        // la lampada resta viva sul davanzale
        const breath = 1 + .05 * Math.sin(now / 1000 * 1.6 + d.i * .8);
        ctx.globalAlpha = 1;
        ctx.shadowColor = d.c; ctx.shadowBlur = 10;
        ctx.fillStyle = d.c;
        ctx.beginPath(); ctx.arc(d.x, d.y, vw(.8) / 2 * breath, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    for (const k in els) {
      const e = els[k];
      if (!e.lit) continue;
      const f = e.peakLevel + .02 * (Math.sin(now / 1000 * 2.5 + e.cfg.x) * .5 + Math.sin(now / 1000 * 5.7 + e.cfg.y) * .5);
      e.div.style.opacity = f;
      e.level = e.peakLevel;
    }
    requestAnimationFrame(frame);
  };
  requestAnimationFrame(frame);

  /* ---------- regia ---------- */
  const sched = (s, fn) => setTimeout(fn, s * 1000);

  const ignite = k => {
    const e = els[k];
    const peak = e.cfg.peak;
    e.peakLevel = peak;
    e.div.animate([
      { opacity: 0, offset: 0 },
      { opacity: .35, offset: .13 },
      { opacity: .12, offset: .31 },
      { opacity: peak, offset: 1 },
    ], { duration: 450, easing: 'cubic-bezier(.2,0,.1,1)', fill: 'forwards' });
    e.lit = true; e.level = peak;
    e.tag.classList.add('on');
    if (e.pool) e.pool.style.opacity = .75;
  };

  const showWord = beat => {
    const big = word.querySelector('.big');
    const sub = word.querySelector('.sub');
    big.className = 'big' + (beat.word.length > 1 ? ' two' : '');
    big.innerHTML = beat.word.join('<br>');
    sub.textContent = beat.sub;
    sub.style.color = rgba(WINS.find(w => w.k === beat.win).c, .85);
    word.hidden = false;
    word.animate([
      { opacity: 0, transform: 'translate(-50%,-50%) scale(.94)' },
      { opacity: 1, transform: 'translate(-50%,-50%) scale(1)' },
    ], { duration: 250, easing: 'ease-out', fill: 'forwards' });
  };

  const retreatWord = beat => {
    const c = els[beat.win].cfg;
    const from = word.querySelector('.big').getBoundingClientRect();
    const dx = vw(c.x) - (from.left + from.width / 2);
    const dy = vh(c.y) - (from.top + from.height / 2);
    const sc = Math.max(.03, vw(c.w) / Math.max(1, from.width));
    word.animate([
      { transform: 'translate(-50%,-50%)', opacity: 1, filter: 'blur(0px)' },
      { filter: 'blur(3px)', opacity: .6, offset: .5 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(${sc})`, opacity: 0, filter: 'blur(0px)' },
    ], { duration: 550, easing: 'cubic-bezier(.7,0,.15,1)', fill: 'forwards' })
      .onfinish = () => { word.hidden = true; };
  };

  const flyDot = (beatIndex, winK) => {
    const d = dots[DOT_BEAT.indexOf(beatIndex)];
    const to = sillPos(winK);
    d.p0 = { x: d.x, y: d.y };
    d.p1 = to;
    d.pc = { x: (d.x + to.x) / 2, y: Math.min(d.y, to.y) - vh(9) };
    d.t0 = performance.now();
    d.state = 'fly';
  };

  const runBeat = (beat, index) => {
    flyDot(index, beat.win);
    sched(.15, () => showWord(beat));
    sched(1.25, () => retreatWord(beat));
    sched(1.5, () => ignite(beat.win));
    if (beat.win === 'D') sched(2.0, () => {
      doorlight.animate([{ opacity: 0 }, { opacity: .85 }], { duration: 700, fill: 'forwards', easing: 'ease-out' });
      doorPool.style.opacity = .8;
      document.getElementById('doorglow').animate([{ opacity: 0 }, { opacity: .28 }], { duration: 900, fill: 'forwards', easing: 'ease-out' });
      for (const k in els) if (els[k].lit) els[k].div.animate(
        [{ opacity: els[k].peakLevel }, { opacity: Math.min(1, els[k].peakLevel + .05), offset: .5 }, { opacity: els[k].peakLevel }],
        { duration: 600, easing: 'ease-in-out' });
    });
  };

  const play = () => {
    sched(.8, () => titolo.classList.add('on'));
    BEATS.forEach((b, i) => sched(b.at, () => runBeat(b, i)));
    sched(10.8, () => { chiusa.classList.add('s1'); titolo.classList.add('dim'); });
    sched(11.7, () => chiusa.classList.add('s2'));
  };

  const jumpTableau = () => {
    titolo.classList.add('on', 'dim');
    chiusa.classList.add('s1', 's2');
    doorlight.setAttribute('opacity', '.85');
    doorPool.style.opacity = .8;
    document.getElementById('doorglow').setAttribute('opacity', '.28');
    start = performance.now() - 12000;
    for (const k in els) {
      const e = els[k];
      e.peakLevel = e.cfg.peak; e.lit = true; e.level = e.cfg.peak;
      e.div.style.opacity = e.cfg.peak;
      e.tag.classList.add('on');
      if (e.pool) e.pool.style.opacity = .75;
    }
    dots.forEach((d, i) => {
      const beatIndex = DOT_BEAT[i];
      const to = sillPos(BEATS[beatIndex].win);
      d.x = to.x; d.y = to.y; d.state = 'lamp';
    });
  };

  document.getElementById('replay').onclick = () => location.search = '';
  if (TABLEAU) requestAnimationFrame(() => requestAnimationFrame(jumpTableau));
  else play();
})();
</script>
</body>
</html>
