<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROVA · P12 — La casa di notte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #071d21;
    --ink-deep: #04141a;
    --paper: #f7f5ee;
    --acid: #aab322;
    --food: #d8a94e;
    --env: #7ebdae;
    --health: #d08b80;
    --agr: #aab322;
    --serif: "Cormorant Garamond", serif;
    --sans: "Outfit", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    overflow: hidden;
    background: var(--ink);
    font-family: var(--sans);
    color: var(--paper);
  }
  /* vignetta: il buio ha una forma */
  #stage {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 140vw 120vh at 50% 42%, var(--ink) 40%, var(--ink-deep) 100%);
  }
  /* dominante calda che cresce con le accensioni */
  #warm {
    position: fixed;
    inset: 0;
    background: rgba(216,169,78,.04);
    opacity: 0;
    transition: opacity 6s linear;
    pointer-events: none;
  }
  /* canvas: pallini, scie, pulviscolo */
  #fx { position: fixed; inset: 0; pointer-events: none; }

  /* ---- il negativo della casa ---- */
  #roof {
    position: fixed;
    left: 34%;
    top: 29.5vh;
    width: 20vw; /* proiezione della falda */
    height: 2px;
    background: linear-gradient(90deg, rgba(247,245,238,0) 0%, rgba(247,245,238,.10) 45%, rgba(247,245,238,.07) 85%, rgba(247,245,238,0) 100%);
    filter: blur(1px);
    transform: rotate(-22deg);
    transform-origin: left center;
    -webkit-mask: linear-gradient(90deg, #000 0 0) left / 0% 100% no-repeat;
    mask: linear-gradient(90deg, #000 0 0) left / 0% 100% no-repeat;
    transition: -webkit-mask-size 0.9s cubic-bezier(.22,1,.36,1), mask-size 0.9s cubic-bezier(.22,1,.36,1), opacity .3s ease;
  }
  #roof.on { -webkit-mask-size: 100% 100%; mask-size: 100% 100%; }
  #edge {
    position: fixed;
    left: 66.5%;
    top: 33vh;
    width: 1px;
    height: 31vh;
    background: rgba(126,189,174,.05);
    filter: blur(2px);
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  #edge.on { opacity: 1; }

  /* ---- finestre ---- */
  .win {
    position: fixed;
    transform: translate(-50%, -50%);
    border-radius: 3px;
    opacity: 0;
    /* telaio scuro + doppio alone (stretto e largo, caduto in basso) */
    box-shadow:
      inset 0 0 2px 1px rgba(7,29,33,.6),
      0 0 3vw var(--halo1),
      0 2vh 8vw var(--halo2);
  }
  .win .glass {
    position: absolute;
    inset: 0;
    border-radius: 3px;
    background: radial-gradient(120% 130% at 20% 85%,
      rgba(255,244,214,.95) 0%,
      var(--mix) 46%,
      var(--rim) 100%);
  }
  .win .ceiling {
    position: absolute;
    inset: 0;
    border-radius: 3px;
    background: linear-gradient(180deg, rgba(7,29,33,.45), transparent 46%);
  }
  .win .mullion {
    position: absolute;
    top: 0;
    height: 55%;
    width: 2px;
    background: rgba(7,29,33,.5);
  }
  .win .content {
    position: absolute;
    left: 8%;
    right: 6%;
    bottom: 7%;
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: .55vw;
    align-items: start;
  }
  .win .lamp {
    width: .9vw;
    height: .9vw;
    margin-top: .25vh;
    border-radius: 50%;
    background: var(--c);
    box-shadow: 0 0 8px var(--c);
  }
  .win .name {
    color: #071d21;
    font-weight: 600;
    font-size: clamp(.72rem, 1vw, .95rem);
    letter-spacing: .04em;
    line-height: 1.15;
  }
  .win .keys {
    grid-column: 2;
    margin-top: .35vh;
    color: rgba(7,29,33,.65);
    font-weight: 400;
    font-size: clamp(.55rem, .72vw, .7rem);
    line-height: 1.35;
  }
  /* riflesso al suolo */
  .glow-floor {
    position: fixed;
    width: 14vw;
    height: 2.4vh;
    transform: translate(-50%, 0);
    border-radius: 50%;
    background: radial-gradient(closest-side, var(--c), transparent);
    opacity: 0;
    transition: opacity .6s ease;
    filter: blur(6px);
  }

  /* ---- testi ---- */
  #titolo {
    position: fixed;
    top: 8vh;
    left: 50%;
    transform: translateX(-50%) translateY(1.5vh);
    width: min(80vw, 900px);
    text-align: center;
    font-family: var(--sans);
    font-weight: 500;
    font-size: clamp(1rem, 1.8vw, 1.5rem);
    letter-spacing: .06em;
    opacity: 0;
    transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
  }
  #titolo.on { opacity: 1; transform: translateX(-50%); }
  #titolo.dim { opacity: .55; transition: opacity 1s ease; }
  #titolo strong { color: var(--acid); font-weight: 600; }

  #word {
    position: fixed;
    top: 44vh;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 96vw;
    text-align: center;
    pointer-events: none;
  }
  #word .big {
    font-family: var(--serif);
    font-weight: 600;
    color: var(--paper);
    font-size: clamp(3.2rem, 10vw, 8.8rem);
    line-height: .95;
    letter-spacing: .02em;
  }
  #word .big.two { font-size: clamp(2.4rem, 7vw, 6.2rem); }
  #word .sub {
    margin-top: 1.6vh;
    font-family: var(--sans);
    font-weight: 300;
    font-size: clamp(.85rem, 1.4vw, 1.15rem);
    letter-spacing: .22em;
    text-transform: uppercase;
  }

  #chiusa {
    position: fixed;
    top: 88vh;
    left: 50%;
    transform: translateX(-50%);
    width: min(86vw, 1000px);
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    color: var(--paper);
  }
  #chiusa span { opacity: 0; transition: opacity .5s cubic-bezier(.22,1,.36,1); display: inline-block; }
  #chiusa .p2 { transform: translateY(1vh); transition: opacity .5s cubic-bezier(.22,1,.36,1), transform .5s cubic-bezier(.22,1,.36,1); }
  #chiusa.s1 .p1 { opacity: 1; }
  #chiusa.s2 .p2 { opacity: 1; transform: none; }
  #chiusa em {
    font-style: italic;
    text-decoration: underline;
    text-decoration-color: var(--acid);
    text-decoration-thickness: 1px;
    text-underline-offset: .35em;
  }
  #replay {
    position: fixed;
    right: 18px;
    bottom: 14px;
    z-index: 40;
    padding: 6px 14px;
    border: 1px solid rgba(247,245,238,.25);
    border-radius: 99px;
    background: none;
    color: rgba(247,245,238,.6);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: .08em;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="warm"></div>
<div id="roof"></div>
<div id="edge"></div>
<canvas id="fx"></canvas>

<p id="titolo"><strong>CASA</strong> parte da capacità reali, non da una pagina bianca.</p>
<div id="word" hidden><div class="big"></div><div class="sub"></div></div>
<p id="chiusa"><span class="p1">La casa…</span> <span class="p2">è <em>già arredata</em>.</span></p>
<button id="replay" type="button">↺ rivedi</button>

<script>
(() => {
  'use strict';
  const qs = new URLSearchParams(location.search);
  const TABLEAU = qs.has('tableau');

  const mix = (hex, p, base = [255, 244, 214]) => {
    const n = parseInt(hex.slice(1), 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    const m = c => Math.round(c);
    return `rgba(${m(base[0] + (r - base[0]) * p)},${m(base[1] + (g - base[1]) * p)},${m(base[2] + (b - base[2]) * p)},.95)`;
  };
  const rgba = (hex, a) => {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  };

  // finestre: asimmetrie deliberate (una casa vera non è una griglia)
  const WINS = [
    { k: 'A', name: 'Formazione', keys: 'carbon farming · digitale · competenze ibride', c: '#aab322', x: 42, y: 36, w: 9, h: 13, peak: .92, mulls: [.38] },
    { k: 'B', name: 'Capacità scientifiche', keys: 'dati · clima · agricoltura · cibo · salute', c: '#7ebdae', x: 58, y: 37.5, w: 9, h: 13, peak: .92, mulls: [.38] },
    { k: 'C', name: 'Esperienza operativa', keys: 'sperimentazione · ricerca · open innovation', c: '#d8a94e', x: 41, y: 57, w: 9.5, h: 14, peak: 1, mulls: [.38] },
    { k: 'D', name: 'Relazioni', keys: 'università · imprese · ricerca · territori', c: '#d08b80', x: 58.5, y: 56, w: 13, h: 15, peak: 1, mulls: [.333, .666] },
  ];
  // ordine di vita: prima la cucina
  const BEATS = [
    { at: 2.6, win: 'C', word: ['ESPERIENZA'], sub: 'sperimentazione · ricerca · open innovation' },
    { at: 4.8, win: 'B', word: ['CAPACITÀ', 'SCIENTIFICHE'], sub: 'dati · clima · agricoltura · cibo · salute' },
    { at: 6.9, win: 'A', word: ['FORMAZIONE'], sub: 'carbon farming · digitale · competenze ibride' },
    { at: 9.0, win: 'D', word: ['RELAZIONI'], sub: 'università · imprese · ricerca · territori' },
  ];

  const els = {};
  for (const w of WINS) {
    const div = document.createElement('div');
    div.className = 'win';
    div.style.cssText = `left:${w.x}%; top:${w.y}vh; width:${w.w}vw; height:${w.h}vh;` +
      `--c:${w.c}; --mix:${mix(w.c, .27)}; --rim:${rgba(w.c, .15)};` +
      `--halo1:${rgba(w.c, .30)}; --halo2:${rgba(w.c, .12)};`;
    div.innerHTML = `<div class="glass"></div><div class="ceiling"></div>` +
      w.mulls.map(m => `<div class="mullion" style="left:${m * 100}%"></div>`).join('') +
      `<div class="content"><span class="lamp"></span><span class="name">${w.name}</span><span class="keys">${w.keys}</span></div>`;
    document.body.appendChild(div);
    const floor = document.createElement('div');
    floor.className = 'glow-floor';
    floor.style.cssText = `left:${w.x}%; top:${w.y + w.h / 2 + 2.2}vh; --c:${rgba(w.c, .5)};`;
    document.body.appendChild(floor);
    els[w.k] = { div, floor, lit: false, level: 0, cfg: w };
  }

  const roof = document.getElementById('roof');
  const edge = document.getElementById('edge');
  const warm = document.getElementById('warm');
  const titolo = document.getElementById('titolo');
  const word = document.getElementById('word');
  const chiusa = document.getElementById('chiusa');

  /* ---------- canvas: pallini con scie + pulviscolo con coni ---------- */
  const cv = document.getElementById('fx');
  const ctx = cv.getContext('2d');
  let W = 0, H = 0;
  const fit = () => {
    const dpr = Math.min(2, devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  fit(); addEventListener('resize', fit, { passive: true });

  const vw = v => v * W / 100, vh = v => v * H / 100;
  const DOTC = ['#d8a94e', '#7ebdae', '#d08b80', '#aab322'];
  // dot i → beat: cibo→C(beat0), ambiente→B(beat1), agricoltura→A(beat2), salute→D(beat3)
  const DOT_BEAT = [0, 1, 3, 2]; // indice beat per dot [cibo, ambiente, salute, agricoltura]

  const dots = DOTC.map((c, i) => ({
    c, i,
    x: -vw(6) - i * vw(2.2), y: vh(47),
    trail: [],
    state: 'enter', // enter → idle → fly → lamp
    t0: 0,
  }));

  const lampPos = k => {
    const r = els[k].div.querySelector('.lamp').getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  };

  // pulviscolo: 3 piani di parallasse
  const dust = [];
  const mkDust = (n, r0, r1, drift, alpha) => {
    for (let i = 0; i < n; i++) dust.push({
      x: Math.random() * W, y: Math.random() * H,
      r: r0 + Math.random() * (r1 - r0),
      dr: drift, a: alpha, ph: Math.random() * 7,
    });
  };
  mkDust(40, .5, .8, 2, .04);
  mkDust(28, .8, 1.5, 4, .07);
  mkDust(12, 1.5, 2.5, 7, .10);

  const inCone = (p) => {
    // trapezio dal davanzale, allargandosi verso il basso; ritorna [fattore, colore]
    for (const k in els) {
      const e = els[k];
      if (e.level < .2) continue;
      const c = e.cfg;
      const sill = vh(c.y + c.h / 2);
      const dy = p.y - sill;
      if (dy < 0 || dy > vh(20)) continue;
      const spread = 1 + .8 * (dy / vh(20));
      const half = vw(c.w) / 2 * spread;
      const cx = vw(c.x * W / W * 100) / 100; // no-op guard
      const px = vw(c.x);
      if (Math.abs(p.x - px) < half) return [e.level, e.cfg.c];
    }
    return [0, null];
  };

  let start = performance.now();
  let elapsed = 0;

  const drawDot = (d, now) => {
    d.trail.push({ x: d.x, y: d.y });
    if (d.trail.length > 14) d.trail.shift();
    d.trail.forEach((p, j) => {
      const f = j / d.trail.length;
      ctx.globalAlpha = f * .5;
      ctx.fillStyle = d.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, vw(.9) / 2 * (0.15 + .85 * f), 0, 7); ctx.fill();
    });
    const breath = 1 + .06 * Math.sin(now / 1000 * 2 + d.i * .6);
    ctx.globalAlpha = 1;
    ctx.shadowColor = d.c; ctx.shadowBlur = 8;
    ctx.fillStyle = d.c;
    ctx.beginPath(); ctx.arc(d.x, d.y, vw(.9) / 2 * breath, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
  };

  const qbez = (p0, p1, p2, t) => {
    const u = 1 - t;
    return { x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x, y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y };
  };

  const frame = now => {
    elapsed = (now - start) / 1000;
    ctx.clearRect(0, 0, W, H);

    // pulviscolo
    for (const p of dust) {
      p.y -= p.dr / 60;
      p.x += Math.sin(now / 1000 * .3 + p.ph) * .05;
      if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
      const [lit, col] = inCone(p);
      const a = p.a * (0.4 + 0.6 * lit);
      ctx.globalAlpha = a;
      ctx.fillStyle = lit && col ? col : '#f7f5ee';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // pallini
    for (const d of dots) {
      if (d.state === 'enter') {
        const k = Math.min(1, elapsed / .8);
        const e = 1 - Math.pow(1 - k, 3);
        d.x = -vw(6) - d.i * vw(2.2) + (vw(50) - d.i * vw(2.2) + vw(3.3) - (-vw(6) - d.i * vw(2.2))) * e;
        d.y = vh(47);
        if (k >= 1) d.state = 'idle';
        drawDot(d, now);
      } else if (d.state === 'idle') {
        d.y = vh(47) + Math.sin(now / 1000 * 1.2 + d.i) * vh(.4);
        drawDot(d, now);
      } else if (d.state === 'fly') {
        const k = Math.min(1, (now - d.t0) / 700);
        const e = k * k * (3 - 2 * k);
        const p = qbez(d.p0, d.pc, d.p1, e);
        d.x = p.x; d.y = p.y;
        drawDot(d, now);
        if (k >= 1) { d.state = 'lamp'; }
      }
      // state 'lamp': il pallino È la lampada della finestra (DOM), non si disegna più
    }

    // micro-flicker perpetuo delle finestre accese
    for (const k in els) {
      const e = els[k];
      if (!e.lit) continue;
      const f = e.peakLevel + .02 * (Math.sin(now / 1000 * 2 * Math.PI * .4 + e.cfg.x) * .5 + Math.sin(now / 1000 * 2 * Math.PI * .9 + e.cfg.y) * .5);
      e.div.style.opacity = f;
      e.level = e.peakLevel;
    }

    requestAnimationFrame(frame);
  };
  requestAnimationFrame(frame);

  /* ---------- regia ---------- */
  const sched = (s, fn) => setTimeout(fn, s * 1000);

  const igniteWin = (k, peak) => {
    const e = els[k];
    e.peakLevel = peak;
    // accensione elettrica in 3 tempi
    e.div.animate([
      { opacity: 0, offset: 0 },
      { opacity: .35, offset: .13 },
      { opacity: .12, offset: .31 },
      { opacity: peak, offset: 1 },
    ], { duration: 450, easing: 'cubic-bezier(.2,0,.1,1)', fill: 'forwards' });
    e.lit = true;
    e.level = peak;
    e.floor.style.opacity = .07 * 10 * (peak === 1 ? 1 : .8); // .07 circa, lieve differenza per piano
    e.floor.style.opacity = peak === 1 ? .5 : .38;
  };

  const showWord = (beat) => {
    const big = word.querySelector('.big');
    const sub = word.querySelector('.sub');
    big.className = 'big' + (beat.word.length > 1 ? ' two' : '');
    big.innerHTML = beat.word.join('<br>');
    sub.textContent = beat.sub;
    sub.style.color = rgba(WINS.find(w => w.k === beat.win).c, .85);
    word.hidden = false;
    word.animate([
      { opacity: 0, transform: 'translate(-50%,-50%) scale(.94)', letterSpacing: '.06em' },
      { opacity: 1, transform: 'translate(-50%,-50%) scale(1)' },
    ], { duration: 250, easing: 'ease-out', fill: 'forwards' });
  };

  const retreatWord = (beat) => {
    const target = els[beat.win].div.querySelector('.name').getBoundingClientRect();
    const from = word.querySelector('.big').getBoundingClientRect();
    const dx = (target.left + target.width / 2) - (from.left + from.width / 2);
    const dy = (target.top + target.height / 2) - (from.top + from.height / 2);
    const sc = Math.max(.04, target.width / Math.max(1, from.width));
    word.animate([
      { transform: 'translate(-50%,-50%)', opacity: 1, filter: 'blur(0px)' },
      { filter: 'blur(3px)', opacity: .6, offset: .5 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(${sc})`, opacity: 0, filter: 'blur(0px)' },
    ], { duration: 550, easing: 'cubic-bezier(.7,0,.15,1)', fill: 'forwards' })
      .onfinish = () => { word.hidden = true; };
  };

  const flyDot = (beatIndex, winK) => {
    const d = dots[DOT_BEAT.indexOf(beatIndex)];
    const to = lampPos(winK);
    d.p0 = { x: d.x, y: d.y };
    d.p1 = to;
    d.pc = { x: (d.x + to.x) / 2, y: Math.min(d.y, to.y) - vh(10) };
    d.t0 = performance.now();
    d.state = 'fly';
  };

  const runBeat = (beat, index) => {
    // il pallino parte e "trascina" la parola
    flyDot(index, beat.win);
    sched(.15, () => showWord(beat));
    sched(1.25, () => retreatWord(beat));
    sched(1.5, () => igniteWin(beat.win, WINS.find(w => w.k === beat.win).peak));
    if (beat.win === 'A') sched(1.5, () => { roof.style.opacity = 1.4; setTimeout(() => roof.style.opacity = '', 300); });
    if (beat.win === 'D') sched(1.5, () => {
      // bloom extra + respiro corale
      els.D.div.animate([
        { boxShadow: `inset 0 0 2px 1px rgba(7,29,33,.6), 0 0 3vw ${rgba('#d08b80', .3)}, 0 2vh 8vw ${rgba('#d08b80', .12)}` },
        { boxShadow: `inset 0 0 2px 1px rgba(7,29,33,.6), 0 0 4vw ${rgba('#d08b80', .5)}, 0 2vh 10vw ${rgba('#d08b80', .2)}`, offset: .5 },
        { boxShadow: `inset 0 0 2px 1px rgba(7,29,33,.6), 0 0 2.5vw ${rgba('#d08b80', .3)}, 0 2vh 8vw ${rgba('#d08b80', .12)}` },
      ], { duration: 800, easing: 'ease-in-out' });
      sched(.4, () => {
        for (const k in els) if (els[k].lit) els[k].div.animate(
          [{ opacity: els[k].peakLevel }, { opacity: Math.min(1, els[k].peakLevel + .05), offset: .5 }, { opacity: els[k].peakLevel }],
          { duration: 600, easing: 'ease-in-out' });
      });
    });
  };

  const play = () => {
    sched(.8, () => titolo.classList.add('on'));
    sched(1.8, () => { roof.classList.add('on'); edge.classList.add('on'); });
    BEATS.forEach((b, i) => sched(b.at, () => runBeat(b, i)));
    sched(9.6, () => warm.style.opacity = 1);
    sched(10.8, () => { chiusa.classList.add('s1'); titolo.classList.add('dim'); });
    sched(11.7, () => chiusa.classList.add('s2'));
  };

  const jumpTableau = () => {
    titolo.classList.add('on', 'dim');
    roof.classList.add('on'); edge.classList.add('on');
    warm.style.transition = 'none'; warm.style.opacity = 1;
    chiusa.classList.add('s1', 's2');
    start = performance.now() - 12000;
    BEATS.forEach((b) => {
      const e = els[b.win];
      const peak = WINS.find(w => w.k === b.win).peak;
      e.peakLevel = peak; e.lit = true; e.level = peak;
      e.div.style.opacity = peak;
      e.floor.style.opacity = peak === 1 ? .5 : .38;
    });
    dots.forEach((d, i) => {
      d.state = 'lamp';
    });
  };

  document.getElementById('replay').onclick = () => location.search = '';
  if (TABLEAU) requestAnimationFrame(() => requestAnimationFrame(jumpTableau));
  else play();
})();
</script>
</body>
</html>
