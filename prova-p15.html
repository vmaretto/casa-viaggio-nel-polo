<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROVA · P15 — Finale C·A·S·A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#071d21; --paper:#f7f5ee; --acid:#aab322;
    --food:#d8a94e; --env:#7ebdae; --health:#d08b80; --agr:#aab322;
    --serif:"Cormorant Garamond",serif; --sans:"Outfit",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; overflow:hidden; color:var(--paper); font-family:var(--sans);
    background:radial-gradient(ellipse 60% 45% at 50% 46%, #0b262b 0%, #071d21 70%), var(--ink);}

  .frase{position:fixed; top:10.5vh; left:50%; transform:translateX(-50%); width:min(60ch,84vw);
    text-align:center; font-family:var(--serif); font-weight:500; font-size:clamp(21px,2.5vw,34px);
    line-height:1.28; letter-spacing:.01em; color:var(--paper); opacity:.86;}

  .lockup{position:fixed; top:50.5vh; left:50%; transform:translate(-50%,-50%);
    display:flex; justify-content:center; align-items:flex-start; gap:clamp(18px,3.2vw,52px);}
  .col{flex:0 0 auto; min-width:clamp(90px,15vw,220px); display:flex; flex-direction:column; align-items:center;}
  .accento{width:clamp(13px,1.3vw,24px); height:clamp(13px,1.3vw,24px); border-radius:50%;
    margin:0 0 clamp(14px,2vh,32px); background:var(--c); box-shadow:0 0 clamp(11px,1.4vw,24px) var(--c), 0 0 clamp(26px,3vw,48px) var(--c);}
  .lettera{font-family:var(--serif); font-weight:600; font-size:clamp(96px,17vw,236px); line-height:.9; color:var(--c); transform-origin:center 30%;}
  .col.warm .lettera{text-shadow:0 0 clamp(14px,1.8vw,32px) color-mix(in srgb,var(--c) 46%,transparent), 0 0 clamp(38px,4.6vw,84px) color-mix(in srgb,var(--c) 22%,transparent);}
  .col.cool .lettera{text-shadow:0 0 clamp(16px,2vw,36px) color-mix(in srgb,var(--c) 60%,transparent), 0 0 clamp(44px,5.2vw,92px) color-mix(in srgb,var(--c) 30%,transparent);}
  .etichetta{margin-top:clamp(14px,2vh,26px); font-family:var(--sans); font-weight:600;
    font-size:clamp(9px,.92vw,13px); letter-spacing:.22em; text-transform:uppercase;
    color:color-mix(in srgb,var(--c) 82%,#f7f5ee); opacity:.92;}

  .pilastri{position:fixed; bottom:12vh; left:50%; transform:translateX(-50%);
    display:flex; gap:clamp(16px,2vw,30px); justify-content:center; align-items:baseline;
    font-family:var(--sans); font-weight:300; font-size:clamp(13px,1.15vw,18px); letter-spacing:.04em; color:var(--paper);}
  .pilastri span{opacity:.72;}
  .pilastri .sep{color:var(--acid); opacity:.9;}

  #comet{position:fixed; inset:0; pointer-events:none; z-index:10;}

  /* entrata */
  .col .accento,.col .lettera,.col .etichetta,.pilastri span{opacity:0; transform:translateY(14px);}
  .col .accento{transform:translateY(-22px);}
  .frase{opacity:0; transform:translateX(-50%) translateY(14px);}
  body.in .frase{opacity:.86; transform:translateX(-50%); transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);}
  body.in .col .lettera{opacity:1; transform:none; transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);}
  body.in .col .etichetta{opacity:.92; transform:none; transition:opacity .6s ease, transform .6s ease;}
  body.in .col .accento{opacity:1; transform:none; transition:opacity .5s ease, transform .6s cubic-bezier(.34,1.4,.5,1);}
  body.in .pilastri span{opacity:1; transform:none; transition:opacity .6s ease, transform .6s ease;}
  body.in .col:nth-child(1) .lettera{transition-delay:.3s;} body.in .col:nth-child(2) .lettera{transition-delay:.39s;}
  body.in .col:nth-child(3) .lettera{transition-delay:.48s;} body.in .col:nth-child(4) .lettera{transition-delay:.57s;}
  body.in .col:nth-child(1) .etichetta{transition-delay:.9s;} body.in .col:nth-child(2) .etichetta{transition-delay:.97s;}
  body.in .col:nth-child(3) .etichetta{transition-delay:1.04s;} body.in .col:nth-child(4) .etichetta{transition-delay:1.11s;}
  body.in .pilastri span{transition-delay:1.35s;}
  body.in .col:nth-child(1) .accento{transition-delay:1.65s;} body.in .col:nth-child(2) .accento{transition-delay:1.74s;}
  body.in .col:nth-child(3) .accento{transition-delay:1.83s;} body.in .col:nth-child(4) .accento{transition-delay:1.92s;}

  #replay{position:fixed; right:18px; bottom:14px; z-index:40; padding:6px 14px; border:1px solid rgba(247,245,238,.22); border-radius:99px; background:none; color:rgba(247,245,238,.55); font-size:12px; letter-spacing:.08em; cursor:pointer;}
</style>
</head>
<body>
  <p class="frase">Il luogo in cui ambiente, agricoltura, cibo e salute<br>tornano a lavorare insieme.</p>

  <div class="lockup">
    <div class="col warm" style="--c:var(--food)"><span class="accento"></span><span class="lettera">C</span><span class="etichetta">Cibo</span></div>
    <div class="col cool" style="--c:var(--env)"><span class="accento"></span><span class="lettera">A</span><span class="etichetta">Ambiente</span></div>
    <div class="col cool" style="--c:var(--health)"><span class="accento"></span><span class="lettera">S</span><span class="etichetta">Salute</span></div>
    <div class="col warm" style="--c:var(--agr)"><span class="accento"></span><span class="lettera">A</span><span class="etichetta">Agricoltura</span></div>
  </div>

  <div class="pilastri">
    <span>Uno spazio sperimentale.</span><span class="sep">·</span>
    <span>Una rete di risorse.</span><span class="sep">·</span>
    <span>Una regia comune.</span>
  </div>

  <canvas id="comet"></canvas>
  <button id="replay" type="button">↺ rivedi</button>

<script>
(() => {
  'use strict';
  const P = new URLSearchParams(location.search);
  const cv = document.getElementById('comet'), ctx = cv.getContext('2d');
  let W,H,DPR;
  const fit=()=>{
    DPR=Math.min(2,devicePixelRatio||1); W=innerWidth; H=innerHeight;
    cv.width=W*DPR; cv.height=H*DPR;
    cv.style.width=W+'px'; cv.style.height=H+'px';   // dimensione CSS esplicita: senza, su retina il canvas raddoppia
    ctx.setTransform(DPR,0,0,DPR,0,0);
  };
  fit(); addEventListener('resize', fit, {passive:true});

  const cs = getComputedStyle(document.documentElement);
  const COLORS = ['--food','--env','--health','--agr'].map(v=>cs.getPropertyValue(v).trim());
  const letters = [...document.querySelectorAll('.lettera')];
  const accenti = [...document.querySelectorAll('.accento')];
  const frase = document.querySelector('.frase'), pil = document.querySelector('.pilastri');
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), smooth=k=>k*k*(3-2*k), lerp=(a,b,k)=>a+(b-a)*k;

  // ---- fasi (secondi dall'inizio dell'uscita) ----
  const T_IMPL=0.85, T_GATHER=1.75, T_SHOOT=1.7;   // shoot: base 0->1 su T_SHOOT
  const BEAD=0.052;                                 // sfasamento di scia tra un pallino e il successivo

  let geom=null;
  const initGeom=()=>{
    const starts = accenti.map(el=>{const r=el.getBoundingClientRect(); return {x:r.left+r.width/2, y:r.top+r.height/2};});
    const cy = starts[0].y;                         // riga dei pallini
    const cx = W/2;
    const L = {x:cx, y:cy};                          // punto di lancio della fila
    const ctrl = {x:W*0.72, y:cy - H*0.30};          // controllo: arco verso l'alto
    const exit = {x:W*1.18, y:H*0.02};               // fuori campo, alto-destra (stella cometa)
    // direzione iniziale, per allineare la fila indiana dietro il capofila
    const dir = {x:ctrl.x-L.x, y:ctrl.y-L.y}; const dl=Math.hypot(dir.x,dir.y)||1; dir.x/=dl; dir.y/=dl;
    const gap = Math.min(52, W*0.03);
    const launch = starts.map((s,i)=>({x:L.x - dir.x*gap*i, y:L.y - dir.y*gap*i}));
    const baseR = Math.max(8, accenti[0].getBoundingClientRect().width/2);
    geom = {starts, L, ctrl, exit, launch, baseR, cy, cx};
  };
  // bezier quadratica (accetta s<0 o >1 per estrapolare la coda)
  const C = s => { const g=geom, u=1-s; return {x:u*u*g.L.x+2*u*s*g.ctrl.x+s*s*g.exit.x, y:u*u*g.L.y+2*u*s*g.ctrl.y+s*s*g.exit.y}; };

  // posizione + raggio + alpha del pallino i al tempo t
  const dotAt=(i,t)=>{
    const g=geom;
    if(t<T_IMPL){                       // implosione: il pallino assorbe la lettera e pulsa
      const k=smooth(clamp(t/T_IMPL,0,1));
      return {x:g.starts[i].x, y:g.starts[i].y, r:g.baseR*(1+0.45*Math.sin(k*Math.PI)), a:1};
    } else if(t<T_GATHER){              // si mettono in fila indiana dietro il capofila
      const k=smooth(clamp((t-T_IMPL)/(T_GATHER-T_IMPL),0,1));
      return {x:lerp(g.starts[i].x,g.launch[i].x,k), y:lerp(g.starts[i].y,g.launch[i].y,k), r:g.baseR, a:1};
    } else {                            // partono come cometa lungo la curva C
      const base=(t-T_GATHER)/T_SHOOT;
      const s=base*1.15 - i*BEAD;       // capofila avanti, gli altri a scia (fila indiana)
      const p=C(s);
      const r=g.baseR*(1-clamp(base,0,1)*0.72);
      const a = p.x>W*1.02 || p.y<-H*0.02 ? clamp(1-(Math.max(p.x-W, -p.y)/(W*0.12)),0,1) : 1;
      return {x:p.x, y:p.y, r:Math.max(1,r), a};
    }
  };

  // fotogramma completo al tempo assoluto t (funzione pura → verificabile)
  const render=t=>{
    // testi: la frase e i pilastri svaniscono all'inizio
    const tf=clamp(1-t/0.5,0,1);
    frase.style.opacity=(0.86*tf); frase.style.transition='none';
    pil.style.opacity=(0.72*tf); pil.style.transition='none';
    // lettere: implodono verso l'alto dentro il loro pallino
    letters.forEach((l,i)=>{
      const k=smooth(clamp(t/T_IMPL,0,1));
      l.style.transition='none';
      l.style.opacity=String(1-k);
      l.style.transform=`translateY(${-k*0.95}em) scale(${1-k})`;
      const et=l.parentElement.querySelector('.etichetta');
      et.style.transition='none'; et.style.opacity=String(0.92*tf);
    });
    // spegnere SUBITO i pallini DOM: senza transition:none la dissolvenza ritardata
    // li lascerebbe visibili nelle posizioni orizzontali mentre parte la cometa
    accenti.forEach(a=>{ a.style.transition='none'; a.style.opacity='0'; });
    // canvas: pallini + scie (scia calcolata analiticamente da C → deterministica)
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<4;i++){
      const d=dotAt(i,t), col=COLORS[i];
      if(t>=T_GATHER){                  // scia solo nella fase cometa
        ctx.save(); ctx.globalCompositeOperation='lighter';
        for(let j=1;j<26;j++){
          const dp=dotAt(i,t-j*0.016);
          const f=1-j/26;
          ctx.globalAlpha=Math.pow(f,1.7)*0.5*d.a;
          ctx.fillStyle=col;
          ctx.beginPath(); ctx.arc(dp.x,dp.y,Math.max(.5,d.r*(0.25+0.75*f)),0,7); ctx.fill();
        }
        ctx.restore();
      }
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=0.22*d.a; ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r*2.6,0,7); ctx.fill();
      ctx.restore();
      ctx.globalAlpha=d.a; ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,7); ctx.fill();
      ctx.globalAlpha=1;
    }
  };

  const T_END = T_GATHER + T_SHOOT + 0.5;
  let t0=null, raf=null;
  const loop=now=>{ if(t0===null)t0=now; const t=(now-t0)/1000; render(t); if(t<T_END) raf=requestAnimationFrame(loop); else ctx.clearRect(0,0,W,H); };
  const runExit=()=>{ initGeom(); t0=null; raf=requestAnimationFrame(loop); };

  const play=()=>{
    // ripristina lo stato "pulito" (togli inline dell'uscita)
    letters.forEach(l=>{l.style.cssText='';}); accenti.forEach(a=>a.style.cssText=''); frase.style.cssText=''; pil.style.cssText='';
    ctx.clearRect(0,0,W,H);
    requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.classList.add('in')));
    setTimeout(runExit, 4400);
  };

  document.getElementById('replay').onclick=()=>{ document.body.classList.remove('in'); location.reload(); };

  // ?frame=T : disegna esattamente il fotogramma al tempo T (collaudo deterministico)
  if(P.has('frame')){
    const T=parseFloat(P.get('frame'))||0;
    document.body.classList.add('in');
    const draw=()=>{ try{ initGeom(); render(T); }catch(e){ document.title='ERR '+e.message; } };
    requestAnimationFrame(()=>requestAnimationFrame(draw));
    addEventListener('resize', ()=>{ fit(); draw(); });   // un resize azzera il canvas: ridisegna
    setTimeout(draw,250); setTimeout(draw,700); setTimeout(draw,1150);
    return;
  }
  const force=P.has('force');
  if(!force && document.hidden){
    document.addEventListener('visibilitychange', function once(){ if(!document.hidden){ document.removeEventListener('visibilitychange',once); play(); }});
  } else play();
})();
</script>
</body>
</html>
