<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROVA v3 · P12 — La casa di notte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #071d21;
    --paper: #f7f5ee;
    --acid: #aab322;
    --serif: "Cormorant Garamond", serif;
    --sans: "Outfit", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; overflow: hidden; background: var(--ink); font-family: var(--sans); color: var(--paper); }

  #sky {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 120vw 70vh at 50% 88%, rgba(126,189,174,.075), transparent 60%),
      radial-gradient(ellipse 140vw 120vh at 50% 30%, #082126 30%, #04151a 100%);
  }
  #ground {
    position: fixed; left: 0; right: 0; top: 78vh; bottom: 0;
    background: linear-gradient(180deg, #03130f, #020d0d 70%);
  }
  #ground::before {
    content: ""; position: absolute; left: 12%; right: 12%; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(247,245,238,.06) 30%, rgba(247,245,238,.06) 70%, transparent);
  }

  /* la casa: sagoma statica, bordo lunare che compare con una dissolvenza */
  #house { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  #rim { opacity: 0; transition: opacity 1.2s ease; }
  #rim.on { opacity: 1; }
  #dust { position: fixed; inset: 0; pointer-events: none; }

  /* finestre: solo luce, testo fuori */
  .win {
    position: fixed; transform: translate(-50%, -50%);
    border-radius: 2px;
    opacity: 0; transition: opacity .5s cubic-bezier(.2,0,.1,1);
  }
  .win.on { opacity: var(--peak, 1); }
  .win .glass {
    position: absolute; inset: 0; border-radius: 2px;
    background: radial-gradient(130% 140% at var(--gx,30%) var(--gy,80%),
      var(--g1) 0%, var(--g2) 52%, var(--g3) 100%);
    box-shadow: inset 0 0 3px 1.5px rgba(4,16,18,.75);
  }
  .win .ceiling { position: absolute; inset: 0; border-radius: 2px; background: linear-gradient(180deg, rgba(7,29,33,.5), transparent 48%); }
  .win .mv { position: absolute; top: 0; height: 55%; left: 48%; width: 1.5px; background: rgba(4,16,18,.65); }
  .win .mh { position: absolute; left: 0; right: 0; top: 44%; height: 1.5px; background: rgba(4,16,18,.55); }
  .win .halo { position: absolute; inset: -1px; border-radius: 3px; box-shadow: 0 0 2.6vw var(--halo1), 0 1.2vh 7vw var(--halo2); }
  .win .spill { position: absolute; top: 100%; left: 50%; width: 190%; height: 340%; transform: translateX(-50%); background: radial-gradient(50% 100% at 50% 0%, rgba(232,200,130,.07), transparent 75%); }

  /* pozza di luce a terra (piano terra) */
  .pool { position: fixed; transform: translate(-50%,0); width: 13vw; height: 2.2vh; border-radius: 50%; background: radial-gradient(closest-side, var(--c), transparent); filter: blur(9px); opacity: 0; transition: opacity .8s ease; }

  /* pallini: identici per movimento a quelli delle prime 8 pagine — transizione CSS su left/top */
  .dot {
    position: fixed; width: 16px; height: 16px; margin: -8px 0 0 -8px;
    border-radius: 50%; background: var(--c);
    box-shadow: 0 0 12px var(--c), 0 0 26px var(--c);
    opacity: 0;
    transition: left 1.35s cubic-bezier(.22,1,.36,1), top 1.35s cubic-bezier(.22,1,.36,1),
                opacity .6s ease, transform .6s cubic-bezier(.22,1,.36,1);
  }
  .dot.lamp { width: 15px; height: 15px; margin: -7.5px 0 0 -7.5px; }

  /* etichette */
  .tag { position: fixed; transform: translate(-50%,0); width: max-content; max-width: 16vw; text-align: center; opacity: 0; transition: opacity .7s ease .25s; }
  .tag .name { font-weight: 500; font-size: clamp(.68rem,.85vw,.92rem); letter-spacing: .14em; text-transform: uppercase; color: rgba(247,245,238,.92); }
  .tag .keys { margin-top: .5vh; font-weight: 300; font-size: clamp(.55rem,.68vw,.72rem); letter-spacing: .06em; color: rgba(247,245,238,.62); white-space: nowrap; }
  .tag.on { opacity: 1; }

  #titolo {
    position: fixed; top: 7.5vh; left: 50%; transform: translateX(-50%) translateY(1.5vh);
    width: min(84vw,980px); text-align: center; font-weight: 500;
    font-size: clamp(1rem,1.75vw,1.45rem); letter-spacing: .06em; opacity: 0;
    transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
  }
  #titolo.on { opacity: 1; transform: translateX(-50%); }
  #titolo.dim { opacity: .5; transition: opacity 1s ease; }
  #titolo strong { color: var(--acid); font-weight: 600; }

  #word { position: fixed; top: 40vh; left: 50%; width: 96vw; text-align: center; pointer-events: none; opacity: 0;
          transform: translate(-50%,-50%); transition: opacity .25s ease, transform .55s cubic-bezier(.7,0,.15,1), filter .55s ease; }
  #word.show { opacity: 1; }
  #word .big { font-family: var(--serif); font-weight: 600; color: var(--paper); font-size: clamp(3.2rem,9.5vw,8.4rem); line-height: .95; letter-spacing: .02em; text-shadow: 0 0 80px rgba(247,245,238,.12); }
  #word .big.two { font-size: clamp(2.4rem,6.6vw,5.9rem); }
  #word .sub { margin-top: 1.6vh; font-weight: 300; font-size: clamp(.85rem,1.35vw,1.1rem); letter-spacing: .22em; text-transform: uppercase; }

  #chiusa {
    position: fixed; top: 83vh; left: 50%; transform: translateX(-50%);
    width: min(86vw,1000px); text-align: center; font-family: var(--serif);
    font-style: italic; font-weight: 500; font-size: clamp(1.5rem,2.9vw,2.4rem);
  }
  #chiusa span { opacity: 0; transition: opacity .5s cubic-bezier(.22,1,.36,1); display: inline-block; }
  #chiusa .p2 { transform: translateY(1vh); transition: opacity .5s cubic-bezier(.22,1,.36,1), transform .5s cubic-bezier(.22,1,.36,1); }
  #chiusa.s1 .p1 { opacity: 1; }
  #chiusa.s2 .p2 { opacity: 1; transform: none; }
  #chiusa em { font-style: italic; text-decoration: underline; text-decoration-color: var(--acid); text-decoration-thickness: 1px; text-underline-offset: .35em; }

  #replay { position: fixed; right: 18px; bottom: 14px; z-index: 40; padding: 6px 14px; border: 1px solid rgba(247,245,238,.22); border-radius: 99px; background: none; color: rgba(247,245,238,.55); font-size: 12px; letter-spacing: .08em; cursor: pointer; }
</style>
</head>
<body>
<div id="sky"></div>
<div id="ground"></div>

<svg id="house" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <linearGradient id="wallg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#030e10"></stop>
      <stop offset="1" stop-color="#020a09"></stop>
    </linearGradient>
  </defs>
  <path d="M 28 78 L 28 47 L 47 30 L 58 30 L 58 26.5 L 61.5 26.5 L 61.5 30 L 66 30 L 72 36 L 72 78 Z" fill="url(#wallg)"></path>
  <g id="rim">
    <path d="M 28 47 L 47 30" fill="none" stroke="rgba(247,245,238,.30)" stroke-linejoin="round" vector-effect="non-scaling-stroke" style="stroke-width:1.8px"></path>
    <path d="M 47 30 L 58 30 L 58 26.5 L 61.5 26.5 L 61.5 30 L 66 30 L 72 36" fill="none" stroke="rgba(247,245,238,.14)" stroke-linejoin="round" vector-effect="non-scaling-stroke" style="stroke-width:1.5px"></path>
    <path d="M 28 47 L 28 78 M 72 36 L 72 78" fill="none" stroke="rgba(247,245,238,.06)" vector-effect="non-scaling-stroke" style="stroke-width:1px"></path>
  </g>
  <rect x="48.6" y="69.5" width="2.8" height="8.5" fill="#061c1d"></rect>
  <rect x="48.75" y="69.65" width="2.5" height="8.35" fill="#03120f"></rect>
  <ellipse id="doorglow" cx="51.1" cy="73.8" rx="1.6" ry="4.6" fill="#d8a94e" opacity="0" style="filter: blur(6px)"></ellipse>
  <rect id="doorlight" x="51.0" y="69.65" width=".4" height="8.35" fill="#e9c27a" opacity="0"></rect>
</svg>

<canvas id="dust"></canvas>

<p id="titolo"><strong>CASA</strong> parte da capacità reali, non da una pagina bianca.</p>
<div id="word"><div class="big"></div><div class="sub"></div></div>
<p id="chiusa"><span class="p1">La casa…</span> <span class="p2">è <em>già arredata</em>.</span></p>
<button id="replay" type="button">↺ rivedi</button>

<script>
(() => {
  'use strict';
  window.onerror=(m,src,l,c)=>{document.title='JSERR '+m+' @'+l+':'+c;};
  const qs = new URLSearchParams(location.search);
  const TABLEAU = qs.has('tableau');

  const rgba = (hex, a) => { const n = parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };
  const tint = (hex, p) => { const n=parseInt(hex.slice(1),16),w=[232,200,130],r=(n>>16)&255,g=(n>>8)&255,b=n&255,h=c=>Math.round(c).toString(16).padStart(2,'0'); return '#'+h(w[0]+(r-w[0])*p)+h(w[1]+(g-w[1])*p)+h(w[2]+(b-w[2])*p); };
  const glassStop = (base, hex, p, a) => { const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; return `rgba(${Math.round(base[0]+(r-base[0])*p)},${Math.round(base[1]+(g-base[1])*p)},${Math.round(base[2]+(b-base[2])*p)},${a})`; };

  const WINS = {
    A: { name:'Formazione', keys:'carbon farming · digitale · competenze ibride', c:'#aab322', x:40.5, y:51, w:4.6, h:7, peak:.9, side:'L', up:true, tagY:57.2 },
    B: { name:'Capacità scientifiche', keys:'dati · clima · agricoltura · cibo · salute', c:'#7ebdae', x:60.5, y:50, w:4.6, h:7, peak:.9, side:'R', up:true, tagY:56.2 },
    C: { name:'Esperienza operativa', keys:'sperimentazione · ricerca · open innovation', c:'#d8a94e', x:38.5, y:66.5, w:5.4, h:8.4, peak:1, side:'L', tagY:72.6 },
    D: { name:'Relazioni', keys:'università · imprese · ricerca · territori', c:'#d08b80', x:62.5, y:66, w:6.6, h:8.8, peak:1, side:'R', tagY:72.3 },
  };
  const BEATS = [
    { at:2.6, k:'C', word:['ESPERIENZA'] },
    { at:4.8, k:'B', word:['CAPACITÀ','SCIENTIFICHE'] },
    { at:6.9, k:'A', word:['FORMAZIONE'] },
    { at:9.0, k:'D', word:['RELAZIONI'] },
  ];
  const sill = k => { const c = WINS[k]; return { x: c.x, y: c.y + c.h/2 - 1.2 }; };

  const els = {};
  for (const k in WINS) {
    const w = WINS[k];
    const div = document.createElement('div');
    div.className = 'win';
    div.style.cssText = `left:${w.x}vw; top:${w.y}vh; width:${w.w}vw; height:${w.h}vh; --peak:${w.peak};`
      + `--halo1:${rgba(tint(w.c,.35),.26)}; --halo2:${rgba(tint(w.c,.35),.09)};`
      + `--g1:${glassStop([244,229,193],w.c,.10,.97)}; --g2:${glassStop([232,212,154],w.c,.10,.9)}; --g3:${glassStop([206,180,120],w.c,.12,.22)};`
      + `--gx:${w.side==='L'?'10%':'90%'}; --gy:6%;`;
    div.innerHTML = '<div class="halo"></div><div class="spill"></div><div class="glass"></div><div class="ceiling"></div><div class="mv"></div><div class="mh"></div>';
    document.body.appendChild(div);

    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.style.cssText = `left:${w.x}vw; top:${w.tagY}vh;`;
    tag.innerHTML = `<div class="name">${w.name}</div><div class="keys">${w.keys}</div>`;
    document.body.appendChild(tag);

    let pool = null;
    if (!w.up) { pool = document.createElement('div'); pool.className='pool'; pool.style.cssText=`left:${w.x}vw; top:78.4vh; --c:rgba(232,200,130,.28);`; document.body.appendChild(pool); }

    const dot = document.createElement('i');
    dot.className = 'dot';
    dot.style.setProperty('--c', w.c);
    document.body.appendChild(dot);

    els[k] = { div, tag, pool, dot, cfg: w };
  }
  const doorPool = document.createElement('div');
  doorPool.className = 'pool';
  doorPool.style.cssText = 'left:50vw; top:78.2vh; width:19vw; height:3vh; --c:rgba(216,169,78,.5); filter: blur(11px);';
  document.body.appendChild(doorPool);

  const titolo = document.getElementById('titolo');
  const word = document.getElementById('word');
  const chiusa = document.getElementById('chiusa');
  const rim = document.getElementById('rim');
  const doorlight = document.getElementById('doorlight');
  const doorglow = document.getElementById('doorglow');

  // ---------- animazione come funzione del tempo (verificabile con ?frame=T) ----------
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), smooth=k=>k*k*(3-2*k), lerp=(a,b,k)=>a+(b-a)*k;
  const B = { SHOW:0, HOLD:1.15, RETREAT_END:1.75, LIGHT:1.5, DOT:1.5, DOT_DUR:1.35 };
  const ROW_ORDER = ['C','B','D','A'];               // cibo, ambiente, salute, agricoltura
  const rowPos = k => { const i=ROW_ORDER.indexOf(k); return { x:50+(i-1.5)*2.1, y:76 }; };

  const setWord = beat => {
    const big=word.querySelector('.big'), sub=word.querySelector('.sub');
    if(word.dataset.k===beat.k) return;
    word.dataset.k=beat.k;
    big.className='big'+(beat.word.length>1?' two':'');
    big.innerHTML=beat.word.join('<br>');
    sub.textContent=WINS[beat.k].keys;
    sub.style.color=rgba(WINS[beat.k].c,.85);
  };

  const render = t => {
    // titolo
    titolo.style.transition='none';
    titolo.style.opacity = String(t<0.7 ? 0 : (t<1.3 ? clamp((t-0.7)/0.5,0,1) : 0.5));
    titolo.style.transform='translateX(-50%)';
    rim.classList.add('on');

    // parola gigante: quale beat è attivo
    let active=null, local=0;
    for(const b of BEATS){ const l=t-b.at; if(l>=0 && l<B.RETREAT_END){ active=b; local=l; } }
    word.style.transition='none';
    if(active){
      setWord(active);
      const c=WINS[active.k];
      if(local<B.HOLD){                                  // compare grande al centro
        const op=clamp(local/0.25,0,1), sc=0.96+0.04*clamp(local/0.5,0,1);
        word.style.opacity=String(op);
        word.style.transform=`translate(-50%,-50%) scale(${sc})`;
        word.style.filter='none';
      } else {                                            // si ritira DENTRO la finestra
        const k=smooth((local-B.HOLD)/(B.RETREAT_END-B.HOLD));
        const dx=(c.x-50), dy=(c.y-40);
        word.style.opacity=String(1-k);
        word.style.transform=`translate(-50%,-50%) translate(${dx*k}vw, ${dy*k}vh) scale(${1-0.94*k})`;
        word.style.filter=`blur(${(k<0.5?k*2:(1-k)*2)*2}px)`;
      }
    } else { word.style.opacity='0'; }

    // finestre, etichette, pallini-lampada, pozze
    for(const b of BEATS){
      const e=els[b.k], l=t-b.at;
      const lit=l>=B.LIGHT;
      e.div.style.transition='none';
      e.div.style.opacity = String(lit ? e.cfg.peak*clamp((l-B.LIGHT)/0.45,0,1) : 0);
      e.tag.style.transition='none';
      e.tag.style.opacity = String(lit ? clamp((l-B.LIGHT-0.2)/0.5,0,1) : 0);
      if(e.pool){ e.pool.style.transition='none'; e.pool.style.opacity=String(lit?0.75*clamp((l-B.LIGHT)/0.6,0,1):0); }
      const r=rowPos(b.k), sp=sill(b.k);
      const kd = lit ? smooth(clamp((l-B.DOT)/B.DOT_DUR,0,1)) : 0;
      const d=e.dot;
      d.style.transition='none';
      d.style.left=lerp(r.x,sp.x,kd)+'vw';
      d.style.top=lerp(r.y,sp.y,kd)+'vh';
      d.style.opacity=String(t<0.2?0:lerp(0.72,1,kd));
      d.style.transform=`scale(${lerp(0.7,1,kd)})`;
    }

    // porta e chiusa
    const kd2=clamp((t-10.8)/0.6,0,1);
    doorlight.setAttribute('opacity', String(0.85*kd2));
    doorglow.setAttribute('opacity', String(0.28*kd2));
    doorPool.style.transition='none'; doorPool.style.opacity=String(0.8*kd2);
    chiusa.querySelector('.p1').style.opacity=String(clamp((t-11.2)/0.5,0,1));
    const p2=chiusa.querySelector('.p2');
    const k2=clamp((t-12.0)/0.5,0,1);
    p2.style.opacity=String(k2); p2.style.transform=`translateY(${(1-k2)*1}vh)`;
    chiusa.querySelectorAll('span').forEach(sp2=>sp2.style.transition='none');
  };

  const T_END = 14.5;
  let t0=null;
  const loop = now => { if(t0===null)t0=now; const t=(now-t0)/1000; render(t); if(t<T_END) requestAnimationFrame(loop); };

  /* pulviscolo: decorazione autonoma, non tocca nient'altro */
  const cv = document.getElementById('dust');
  const cx = cv.getContext('2d');
  let W, H, dust = [];
  const fitDust = () => {
    const dpr = Math.min(2, devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';   // senza, su retina il canvas raddoppia
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };
  fitDust(); addEventListener('resize', fitDust, { passive: true });
  for (let i = 0; i < 70; i++) dust.push({ x: Math.random(), y: Math.random(), r: .5 + Math.random()*2, dr: 1.5 + Math.random()*5, a: .04 + Math.random()*.06, ph: Math.random()*7 });
  const dustFrame = now => {
    cx.clearRect(0, 0, W, H);
    for (const p of dust) {
      p.y -= p.dr / 60 / H;
      if (p.y < -.01) { p.y = 1.01; p.x = Math.random(); }
      cx.globalAlpha = p.a; cx.fillStyle = '#f7f5ee';
      cx.beginPath(); cx.arc((p.x + Math.sin(now/1000*.3 + p.ph) * .003) * W, p.y * H, p.r, 0, 7); cx.fill();
    }
    cx.globalAlpha = 1;
    requestAnimationFrame(dustFrame);
  };
  requestAnimationFrame(dustFrame);

  document.getElementById('replay').onclick = () => location.reload();

  const start = () => { t0=null; requestAnimationFrame(loop); };

  // ?frame=T disegna esattamente quell'istante (collaudo deterministico)
  if (qs.has('frame')) {
    const T = parseFloat(qs.get('frame')) || 0;
    const draw = () => { try{ render(T); document.title='OK t='+T; }catch(e){ document.title='ERR '+e.message; } };
    requestAnimationFrame(() => requestAnimationFrame(draw));
    addEventListener('resize', () => { fitDust(); draw(); });
    setTimeout(draw, 250); setTimeout(draw, 800);
  }
  else if (TABLEAU) { requestAnimationFrame(() => requestAnimationFrame(() => render(13.5))); }
  else if (qs.has('force')) start();
  else if (document.hidden) {
    document.addEventListener('visibilitychange', function once() {
      if (!document.hidden) { document.removeEventListener('visibilitychange', once); start(); }
    });
  } else start();
})();
</script>
</body>
</html>
