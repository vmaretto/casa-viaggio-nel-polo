<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CASA — Il film</title>
<meta name="robots" content="noindex">
<style>
  @font-face {
    font-family: "Cormorant CASA";
    src: url("assets/originale/CormorantGaramond-Regular.woff2") format("woff2");
    font-style: normal; font-weight: 300 700; font-display: swap;
  }
  @font-face {
    font-family: "Cormorant CASA";
    src: url("assets/originale/CormorantGaramond-Italic.woff2") format("woff2");
    font-style: italic; font-weight: 300 700; font-display: swap;
  }
  @font-face {
    font-family: "Outfit CASA";
    src: url("assets/originale/Outfit.woff2") format("woff2");
    font-style: normal; font-weight: 200 700; font-display: swap;
  }
  :root {
    --ink: #071d21;
    --paper: #f7f5ee;
    --acid: #aab322;
    --serif: "Cormorant CASA", "Cormorant Garamond", Georgia, serif;
    --sans: "Outfit CASA", "Outfit", "Helvetica Neue", Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  body { font-family: var(--sans); color: var(--paper); }

  #stage { position: fixed; inset: 0; border: 0; width: 100%; height: 100%; background: #000; }

  /* ---------- schermo di apertura ---------- */
  #open {
    position: fixed; inset: 0; z-index: 30;
    display: grid; place-items: center;
    background: radial-gradient(circle at 50% 62%, rgba(170,179,34,.09), transparent 55%), #000;
    transition: opacity 1.4s ease, visibility 1.4s;
  }
  #open.hidden { opacity: 0; visibility: hidden; }
  .open__inner { text-align: center; padding: 24px; }
  .open__words {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    font-size: clamp(11px, 1.2vw, 14px); letter-spacing: .34em; text-transform: uppercase;
    color: rgba(247,245,238,.55); margin-bottom: 26px;
  }
  .open__words b { font-weight: 500; }
  .open__words b:nth-child(1) { color: #d8a94e; }
  .open__words b:nth-child(2) { color: #7ebdae; }
  .open__words b:nth-child(3) { color: #d08b80; }
  .open__words b:nth-child(4) { color: #aab322; }
  .open__title {
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: clamp(34px, 5.4vw, 74px); line-height: 1.12; margin-bottom: 40px;
    text-wrap: balance;
  }
  #start {
    border: 1px solid rgba(170,179,34,.6); border-radius: 999px;
    padding: 16px 42px; background: rgba(170,179,34,.08); color: var(--acid);
    font-family: var(--serif); font-style: italic; font-size: clamp(18px, 1.8vw, 24px);
    cursor: pointer; transition: background .3s, transform .3s;
  }
  #start:hover { background: rgba(170,179,34,.18); transform: translateY(-2px); }
  .open__direct {
    display: block; width: max-content; margin: 22px auto 0;
    color: rgba(247,245,238,.62); font-family: var(--serif); font-size: 17px;
    font-style: italic; text-decoration: none; transition: color .25s ease;
  }
  .open__direct:hover { color: var(--acid); }
  .open__hint { margin-top: 22px; font-size: 12px; letter-spacing: .12em; color: rgba(247,245,238,.4); }

  /* ---------- schermo finale ---------- */
  #end {
    position: fixed; inset: 0; z-index: 29; display: grid; place-items: center;
    background: #000; opacity: 0; visibility: hidden; transition: opacity 2s ease, visibility 2s;
  }
  #end.shown { opacity: 1; visibility: visible; }
  #end .open__title { margin-bottom: 34px; }
  #replay {
    border: 1px solid rgba(170,179,34,.5); border-radius: 999px;
    padding: 12px 30px; background: rgba(170,179,34,.08); color: var(--acid);
    font-family: var(--serif); font-style: italic; font-size: 18px; cursor: pointer;
    transition: background .3s;
  }
  #replay:hover { background: rgba(170,179,34,.18); }

  /* ---------- sottotitoli ---------- */
  #subs {
    position: fixed; left: 50%; bottom: max(5vh, env(safe-area-inset-bottom)); z-index: 20;
    transform: translateX(-50%);
    max-width: min(860px, 88vw);
    padding: 10px 22px; border-radius: 12px;
    background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
    font-size: clamp(15px, 1.5vw, 21px); line-height: 1.4; text-align: center;
    color: rgba(247,245,238,.95); text-shadow: 0 1px 3px rgba(0,0,0,.8);
    opacity: 0; transition: opacity .35s ease; pointer-events: none;
  }
  #subs.shown { opacity: 1; }
  body.nosubs #subs { display: none; }

  /* ---------- controlli ---------- */
  #bar {
    position: fixed; right: 18px; bottom: 18px; z-index: 25;
    display: flex; gap: 8px; opacity: 0; transition: opacity .4s ease;
  }
  body.ui #bar, #bar:hover { opacity: 1; }
  #bar button {
    min-width: 40px; height: 40px; padding: 0 14px;
    border: 1px solid rgba(247,245,238,.25); border-radius: 999px;
    background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
    color: rgba(247,245,238,.85); font-family: var(--sans); font-size: 13px;
    letter-spacing: .06em; cursor: pointer; transition: background .25s, border-color .25s;
  }
  #bar button:hover { background: rgba(170,179,34,.2); border-color: rgba(170,179,34,.6); }

  #paused {
    position: fixed; inset: 0; z-index: 24; display: none; place-items: center;
    background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
  }
  body.paused #paused { display: grid; }
  #paused span {
    font-family: var(--serif); font-style: italic; font-size: clamp(26px, 3vw, 44px);
    color: rgba(247,245,238,.9);
  }
</style>
</head>
<body class="nosubs">
  <iframe id="stage" src="about:blank" aria-label="CASA — presentazione"></iframe>

  <div id="subs" aria-live="polite"></div>

  <div id="open">
    <div class="open__inner">
      <div class="open__words"><b>Cibo</b><b>Ambiente</b><b>Salute</b><b>Agricoltura</b></div>
      <h1 class="open__title">Un viaggio in quattro mondi<br>che sono una storia sola.</h1>
      <button id="start" type="button">▶&nbsp; Inizia il viaggio</button>
      <a class="open__direct" id="directP09" href="?da=p09">Vai direttamente a p09 →</a>
      <p class="open__hint">CIRCA 6 MINUTI · CON AUDIO · F PER LO SCHERMO INTERO</p>
    </div>
  </div>

  <div id="end">
    <div class="open__inner">
      <h2 class="open__title">Questa è CASA.</h2>
      <button id="replay" type="button">↺&nbsp; Rivedi il viaggio</button>
    </div>
  </div>

  <div id="paused"><span>In pausa — premi spazio</span></div>

  <div id="bar">
    <button id="btnPause" type="button" title="Pausa / riprendi (spazio)">⏸</button>
    <button id="btnSkip" type="button" title="Salta alla scena successiva">⏭</button>
    <button id="btnSubs" type="button" title="Sottotitoli">CC</button>
    <button id="btnFull" type="button" title="Schermo intero (F)">⛶</button>
    <button id="btnRestart" type="button" title="Ricomincia">↺</button>
  </div>

<script>
(() => {
  'use strict';

  /* ============ TIMELINE ============
     Un blocco = una scena del deck + un clip voce.
     pre  = attesa dopo il cambio scena prima della voce (ms)
     post = respiro dopo la voce prima della scena successiva (ms)
     duck = volume musica mentre la voce parla (0..1)                    */
  /* cues: [secondi dal via del clip, comando postMessage per il deck] */
  const BLOCKS = [
    { scene: 0,  clip: 'assets/audio/voce/01.mp3', pre: 1150, post: 1350, duck: .14,
      cues: [
        // Pagina 1 — nascita dei quattro mondi: prima il pallino, poi l'ambito.
        [.18,{casa:'fx',name:'dots',p:'word',a:'cibo'}],        [.56,{casa:'fx',name:'show',n:0,flip:false}],
        [1.9,{casa:'fx',name:'dots',p:'word',a:'ambiente'}],    [2.28,{casa:'fx',name:'show',n:1,flip:false}],
        [4.55,{casa:'fx',name:'dots',p:'word',a:'salute'}],     [4.98,{casa:'fx',name:'show',n:2,flip:false}],
        [7.25,{casa:'fx',name:'dots',p:'word',a:'agricoltura'}],[7.72,{casa:'fx',name:'show',n:3,flip:false}],
        // Prima della frattura: non ancora logo, non ancora casa; solo una costellazione possibile.
        [12.85,{casa:'fx',name:'dots',p:'constellation'}],
        // Chiusura aperta della prima pagina: separazione, non firma ordinata.
        [15.8,{casa:'fx',name:'dots',p:'scatter'}]
      ],
      sub: "C'è il cibo che mangiamo. L'ambiente che ci circonda. La salute che ci sta a cuore. E l'agricoltura, che li tiene insieme da diecimila anni. | Quattro mondi. Un'unica storia. | Eppure… noi li abbiamo divisi." },
    { scene: 1,  clip: 'assets/audio/voce/02.mp3', pre: 750,  post: 1450, duck: .13,
      cues: [
        // Pagina 2 — dalla dispersione alla catena: i pallini si preparano a leggere una relazione.
        [.25,{casa:'fx',name:'dots',p:'chain'}],
        [.45,{casa:'fx',name:'show',n:1}],
        [.95,{casa:'fx',name:'dots',p:'pulse',a:{from:'ambiente',to:'agricoltura'}}],

        [4.8,{casa:'fx',name:'show',n:2}],
        [5.5,{casa:'fx',name:'dots',p:'pulse',a:{from:'agricoltura',to:'cibo'}}],

        [8.4,{casa:'fx',name:'show',n:3}],
        [9.1,{casa:'fx',name:'dots',p:'pulse',a:{from:'cibo',to:'salute'}}],

        // La catena esiste, ma resta non governata: sospensione prima delle conseguenze.
        [13.3,{casa:'fx',name:'dots',p:'pulse',a:{from:'salute',to:'ambiente'}}],
        [13.9,{casa:'fx',name:'dots',p:'hold-chain'}],
        [14.1,{casa:'fx',name:'show',n:4}]
      ],
      sub: "L'ambiente condiziona l'agricoltura. L'agricoltura dà forma al cibo. Il cibo decide la nostra salute. E la salute, a sua volta, ritorna sull'ambiente. | Non è una catena: è un ecosistema. | Eppure li governiamo… separatamente." },
    { scene: 2,  clip: 'assets/audio/voce/03.mp3', pre: 800,  post: 1600, duck: .13,
      cues: [[.4,{casa:'fx',name:'dots',p:'sign'}],[3.1,{casa:'fx',name:'conseq',n:1}],[10.0,{casa:'fx',name:'conseq',n:2}],[16.4,{casa:'fx',name:'conseq',n:3}],[19.4,{casa:'fx',name:'conseq',n:4}],[25.8,{casa:'fx',name:'conseq',n:5}],[21.8,{casa:'fx',name:'show',n:1}]],
      sub: "E il conto arriva. Un terzo delle emissioni globali nasce dai sistemi agroalimentari. | Il clima ha già tolto il 21% alla produttività agricola. | I costi nascosti del cibo: oltre diecimila miliardi di dollari, ogni anno. | E 733 milioni di persone restano senza cibo adeguato. | Non sono quattro crisi diverse. È la stessa crisi… guardata da quattro finestre." },
    { scene: 3,  clip: 'assets/audio/voce/04.mp3', pre: 900,  post: 2600, duck: .13,
      cues: [[.5,{casa:'fx',name:'dots',p:'perimeter'}],[.6,{casa:'fx',name:'show',n:1}],[2.4,{casa:'fx',name:'show',n:2,flip:false}],[6.0,{casa:'fx',name:'show',n:3,flip:false}],[9.6,{casa:'fx',name:'anchor',k:'ambiente'}],[11.0,{casa:'fx',name:'anchor',k:'agricoltura'}],[12.3,{casa:'fx',name:'anchor',k:'cibo'}],[13.5,{casa:'fx',name:'anchor',k:'salute'}],[16.6,{casa:'fx',name:'show',n:4,flip:false}],[18.3,{casa:'fx',name:'mark',c:'cine-collapse'}],[18.45,{casa:'fx',name:'dots',p:'file-bottom'}]],
      sub: "Non mancano le competenze. Non mancano i dati, né le tecnologie. | Manca un luogo dove metterli in relazione. Uno spazio dove chi osserva il clima, chi coltiva, chi trasforma e chi cura lavorino fianco a fianco. | Questo spazio ha un nome." },
    { scene: 4,  clip: 'assets/audio/voce/05.mp3', pre: 600,  post: 1400, duck: .42,
      cues: [[.12,{casa:'fx',name:'dots',p:'letters'}],[.2,{casa:'fx',name:'bridge-letter',n:0}],[1.8,{casa:'fx',name:'bridge-letter',n:1}],[4.7,{casa:'fx',name:'bridge-letter',n:2}],[7.4,{casa:'fx',name:'bridge-letter',n:3}]],
      sub: "Cibo. | Ambiente. | Salute. | Agricoltura. | CASA. | Benvenuti a casa." },
    { scene: 5,  clip: 'assets/audio/voce/06.mp3', pre: 800,  post: 2800, duck: .14,
      cues: [[.05,{casa:'fx',name:'dots',p:'dive'}],[.12,{casa:'fx',name:'birth'}],[.3,{casa:'fx',name:'show',n:11,flip:false}],[1.2,{casa:'fx',name:'show',n:1}],[3.2,{casa:'fx',name:'show',n:6}],[5.2,{casa:'fx',name:'show',n:7}],[10.2,{casa:'fx',name:'show',n:8}],[12.2,{casa:'fx',name:'show',n:9}],[10.3,{casa:'overlay',id:'ov-spazio'}],[22.0,{casa:'overlay'}],[22.15,{casa:'fx',name:'dots',p:'emerge'}]],
      sub: "CASA è un luogo fisico. Campi, serre, laboratori e aule, dove i quattro ambiti diventano un unico campo di innovazione. | Uno spazio sperimentale condiviso: risorse proprie, la rete dei partner, una regia comune. | Disegnato al millimetro… e pensato per diventare vero." },
    { scene: 6,  clip: 'assets/audio/voce/07.mp3', pre: 800,  post: 6000, duck: .14,
      cues: [[.05,{casa:'fx',name:'dots',p:'operate-title'}],[.35,{casa:'fx',name:'show',n:1,flip:false}],[2.6,{casa:'fx',name:'dots',p:'operate-phase',a:0}],[4.2,{casa:'fx',name:'step',n:0}],[8.1,{casa:'fx',name:'dots',p:'operate-phase',a:1}],[9.7,{casa:'fx',name:'step',n:1}],[12.8,{casa:'fx',name:'dots',p:'operate-phase',a:2}],[14.4,{casa:'fx',name:'step',n:2}],[18.0,{casa:'fx',name:'dots',p:'operate-phase',a:3}],[19.6,{casa:'fx',name:'step',n:3}],[23.4,{casa:'fx',name:'mark',c:'cine-cycle'}],[23.8,{casa:'fx',name:'dots',p:'operate-cycle'}]],
      sub: "Come funziona? Prima si forma: chi entra impara a leggere il sistema intero. | Poi si sperimenta: campi, serre e laboratori. | Si co-sviluppa, con la ricerca accanto ai bisogni reali. | Si trasferisce, a imprese, istituzioni, territori. | E ogni risultato… rimette in moto il ciclo." },
    { scene: 7,  clip: 'assets/audio/voce/08.mp3', pre: 800,  post: 800,  duck: .14,
      cues: [[.4,{casa:'fx',name:'dots',p:'who-field'}],[1.45,{casa:'fx',name:'show',n:1}],[2.1,{casa:'fx',name:'step',n:0}],[9.6,{casa:'fx',name:'step',n:1}],[16.6,{casa:'fx',name:'step',n:2}],[22.2,{casa:'fx',name:'step',n:3}],[26.5,{casa:'fx',name:'show',n:2}]],
      sub: "Per chi è CASA? Per le imprese e le startup, che qui provano tecnologie e soluzioni che da sole non potrebbero costruire. | Per le università e la ricerca, che mettono in comune laboratori, dati e competenze. | Per le persone, che imparano lavorando su casi e strumenti reali. | E per le istituzioni e i territori, che decidono guardando le stesse evidenze." },
    { scene: 8,  clip: 'assets/audio/voce/09.mp3', pre: 800,  post: 800,  duck: .14,
      cues: [[.4,{casa:'fx',name:'dots',p:'sign'}],[.5,{casa:'fx',name:'show',n:1}],[5.0,{casa:'fx',name:'step',n:0}],[11.2,{casa:'fx',name:'step',n:1}],[13.8,{casa:'fx',name:'step',n:2}],[16.6,{casa:'fx',name:'step',n:3}],[27.5,{casa:'fx',name:'step',n:4}]],
      sub: "Ogni casa vive dei suoi abitanti. | InnovaliaTech promuove e sostiene: capitale e visione di lungo periodo. FIB tiene la regia operativa. UNIUST forma le competenze. | La scienza entra con CMCC per l'ambiente, CREA per agricoltura e cibo, la Fondazione Santa Lucia per la salute. | E i titoli di coda restano aperti: le convenzioni continuano ad aggiungere nomi." },
    { scene: 9,  clip: 'assets/audio/voce/10.mp3', pre: 800,  post: 4400,  duck: .14,
      cues: [[.4,{casa:'fx',name:'dots',p:'house-door'}],[.5,{casa:'fx',name:'show',n:1}],[2.5,{casa:'fx',name:'step',n:0}],[5.1,{casa:'fx',name:'step',n:1}],[7.7,{casa:'fx',name:'step',n:2}],[10.2,{casa:'fx',name:'step',n:3}],[13.6,{casa:'fx',name:'show',n:2}],[15.3,{casa:'overlay',id:'ov-arredo'}],[33.6,{casa:'overlay'}],[33.8,{casa:'fx',name:'dots',p:'fila-partenza',a:0}],[35.4,{casa:'fx',name:'dots',p:'fila-partenza',a:1}]],
      sub: "E non si parte da zero. Formazione già attiva. Capacità scientifiche. Esperienza operativa. Relazioni costruite negli anni. | La casa… è già arredata. | Basta aprire le porte: dentro, strumenti e tecnologie sono già al lavoro. | E con quattro ambiti che lavorano integrati, ogni progetto ne accende altri: qui l'innovazione… si moltiplica." },
    { scene: 10, clip: 'assets/audio/voce/11.mp3', pre: 800,  post: 800,  duck: .14,
      cues: [[.4,{casa:'fx',name:'dots',p:'road-stars'}],[.5,{casa:'fx',name:'show',n:1}],[2.8,{casa:'fx',name:'step',n:0}],[7.4,{casa:'fx',name:'step',n:1}],[10.9,{casa:'fx',name:'step',n:2}],[14.6,{casa:'fx',name:'mark',c:'cine-map'}],[15.3,{casa:'fx',name:'show',n:2}]],
      sub: "Il percorso è definito. Prima: spazio, governance e risorse. Poi, l'attivazione del luogo e della rete. Quindi, l'estensione a nuovi partner e territori. | Passo dopo passo. Verificando, prima di replicare." },
    { scene: 11, clip: 'assets/audio/voce/12.mp3', pre: 900,  post: 900,  duck: .13,
      cues: [[.3,{casa:'fx',name:'show',n:2}],[.4,{casa:'fx',name:'dots',p:'presidio'}],[.5,{casa:'fx',name:'show',n:1}],[5.8,{casa:'fx',name:'show',n:3}]],
      sub: "A garantire il rigore scientifico, il professor Riccardo Valentini. Premio Nobel per la Pace nel 2007 con il panel dell'ONU sul clima. | Perché l'ambizione ha bisogno di scienza." },
    { scene: 12, clip: 'assets/audio/voce/13.mp3', pre: 800,  post: 900,  duck: .14,
      cues: [[.4,{casa:'fx',name:'dots',p:'sign'}],[.5,{casa:'fx',name:'show',n:1}],[2.5,{casa:'fx',name:'step',n:0}],[2.8,{casa:'fx',name:'dots',p:'actions-pulse',a:0}],[6.8,{casa:'fx',name:'step',n:1}],[7.1,{casa:'fx',name:'dots',p:'actions-pulse',a:1}],[11.4,{casa:'fx',name:'step',n:2}],[11.7,{casa:'fx',name:'dots',p:'actions-pulse',a:2}]],
      sub: "E si comincia adesso. Il coinvolgimento dei partner scientifici è già avviato. La forma societaria più adatta è in via di definizione. | E la ricerca dello spazio è aperta: tre mesi per trasformare un'area in un campo attivo." },
    { scene: 13, clip: 'assets/audio/voce/14.mp3', pre: 900,  post: 500,  duck: .3,
      cues: [[.4,{casa:'fx',name:'show',n:0}],[7.0,{casa:'fx',name:'show',n:1}],[8.3,{casa:'fx',name:'show',n:2}],[9.6,{casa:'fx',name:'show',n:3}],[10.9,{casa:'fx',name:'show',n:4}],[11.6,{casa:'fx',name:'dots',p:'accents-final'}],[13.2,{casa:'fx',name:'show',n:5}]],
      sub: "Il luogo in cui ambiente, agricoltura, cibo e salute tornano a lavorare insieme. | Uno spazio sperimentale. Una rete di risorse. Una regia comune. | Questa… è CASA. | E la porta… è aperta." },
  ];
  const MUSIC_BASE = .55;      // musica quando la voce tace
  const MUSIC_PEAK = .9;       // reveal e finale
  const FINAL_HOLD = 10500;     // coda musicale dopo l'ultima frase
  const PAGE_TO_BLOCK = {
    p01: 0, p02: 1, p03: 2, p04: 3, p04b: 4, p05: 5, p09: 6,
    p10: 7, p11: 8, p12: 9, p13: 10, p14: 11, p14b: 12, p15: 13
  };
  const PARAMS = new URLSearchParams(location.search);
  const requestedStart = (PARAMS.get('da') || PARAMS.get('start') || '').toLowerCase();
  const numericStart = /^\d+$/.test(requestedStart) ? Number(requestedStart) : NaN;
  const START_AT = Number.isInteger(numericStart) && numericStart >= 0 && numericStart < BLOCKS.length
    ? numericStart
    : (PAGE_TO_BLOCK[requestedStart] ?? 0);

  /* ============ elementi ============ */
  const stage = document.getElementById('stage');
  const subs = document.getElementById('subs');
  const open = document.getElementById('open');
  const endScreen = document.getElementById('end');
  const startButton = document.getElementById('start');
  const directP09 = document.getElementById('directP09');

  // Safari conserva con particolare tenacia gli iframe aperti da file://.
  // Una versione diversa a ogni apertura garantisce che il film utilizzi
  // sempre il wow.html appena salvato, anche dopo revisioni ravvicinate.
  stage.src = 'wow.html?cinema&v=' + Date.now();

  // Bollino diagnostico di versione (primi secondi): dice quale cinema.html gira.
  (() => {
    const st = document.createElement('div');
    st.textContent = 'C·21/07·15.1';
    st.style.cssText = 'position:fixed;left:10px;bottom:22px;z-index:99;font:10px/1 monospace;color:rgba(247,245,238,.5);pointer-events:none';
    document.body.appendChild(st);
    setTimeout(() => st.remove(), 8000);
  })();

  if (START_AT > 0) {
    const pageLabel = requestedStart || ('scena ' + START_AT);
    document.querySelector('#open .open__title').innerHTML = 'Dalle competenze all’impatto.<br><small style="font-size:.45em;opacity:.62">Da ' + pageLabel + ' fino alla fine</small>';
    startButton.innerHTML = '▶&nbsp; Avvia da ' + pageLabel;
    directP09.textContent = 'Torna all’inizio del film →';
    directP09.href = location.pathname;
    document.querySelector('#open .open__hint').textContent = 'DA P09 ALLA FINE · CON AUDIO · F PER LO SCHERMO INTERO';
  }

  const music = new Audio('assets/audio/musica.mp3');
  music.loop = true;
  music.volume = 0;
  const clips = BLOCKS.map(b => { const a = new Audio(b.clip); a.preload = 'auto'; return a; });

  const deck = cmd => stage.contentWindow && stage.contentWindow.postMessage(cmd, '*');

  /* volume con rampa morbida */
  let volRaf = null;
  const rampMusic = (to, ms = 900) => {
    cancelAnimationFrame(volRaf);
    const from = music.volume, t0 = performance.now();
    const step = now => {
      const k = Math.min(1, (now - t0) / ms);
      music.volume = from + (to - from) * (k < .5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2) / 2);
      if (k < 1) volRaf = requestAnimationFrame(step);
    };
    volRaf = requestAnimationFrame(step);
  };

  /* sottotitoli: frasi distribuite sulla durata del clip */
  let subTimers = [];
  const clearSubs = () => { subTimers.forEach(clearTimeout); subTimers = []; subs.classList.remove('shown'); };
  const scheduleSubs = (block, dur) => {
    clearSubs();
    const parts = block.sub.split('|').map(t => t.trim()).filter(Boolean);
    const total = parts.reduce((n, p) => n + p.length, 0);
    let at = 0;
    parts.forEach(p => {
      subTimers.push(setTimeout(() => { subs.textContent = p; subs.classList.add('shown'); }, at));
      at += dur * 1000 * (p.length / total);
    });
    subTimers.push(setTimeout(() => subs.classList.remove('shown'), dur * 1000 + 400));
  };

  /* ============ macchina del film ============ */
  let playing = false, cancelled = false, waitTimer = null, current = null;

  const wait = ms => new Promise(res => { waitTimer = setTimeout(res, ms); });

  let cueTimers = [];
  const clearCues = () => { cueTimers.forEach(clearTimeout); cueTimers = []; };
  const scheduleCues = block => {
    clearCues();
    (block.cues || []).forEach(([t, cmd]) => cueTimers.push(setTimeout(() => deck(cmd), t * 1000)));
  };

  const playClip = n => new Promise(res => {
    const a = clips[n];
    current = a;
    a.currentTime = 0;
    const done = () => { a.removeEventListener('ended', done); current = null; res(); };
    a.addEventListener('ended', done);
    a.play().catch(() => setTimeout(done, 4000)); // clip mancante: 4s di sola musica
    const d = a.duration && isFinite(a.duration) ? a.duration : 20;
    scheduleSubs(BLOCKS[n], d);
    scheduleCues(BLOCKS[n]);
  });

  async function run(from = 0) {
    cancelled = false; playing = true;
    for (let i = from; i < BLOCKS.length; i++) {
      if (cancelled) return;
      const b = BLOCKS[i];
      if (b.scene === 4) {            // respiro musicale prima del reveal
        rampMusic(MUSIC_PEAK, 1200); await wait(1600); if (cancelled) return;
      }
      deck({ casa: 'go', index: b.scene });
      await wait(b.pre); if (cancelled) return;
      rampMusic(b.duck, 700);
      await playClip(i); if (cancelled) return;
      rampMusic(b.scene === 4 ? MUSIC_PEAK : MUSIC_BASE, 900);
      await wait(b.post); if (cancelled) return;
    }
    // finale: musica piena, le lettere partono per il viaggio verso il futuro
    rampMusic(MUSIC_PEAK, 1500);
    await wait(1200); if (cancelled) return;
    deck({ casa: 'fx', name: 'finale-exit' });
    await wait(FINAL_HOLD); if (cancelled) return;
    rampMusic(0, 4000);
    await wait(4200);
    playing = false;
    endScreen.classList.add('shown');
  }

  const stopAll = () => {
    cancelled = true; playing = false;
    clearTimeout(waitTimer); clearSubs(); clearCues();
    if (current) { current.pause(); current = null; }
    clips.forEach(a => { a.pause(); a.currentTime = 0; });
  };

  /* ============ avvio / controlli ============ */
  const start = () => {
    if (PARAMS.has('muto')) {
      music.muted = true;
      clips.forEach(c => { c.muted = true; });
    }
    open.classList.add('hidden');
    endScreen.classList.remove('shown');
    document.body.classList.remove('paused');
    pausedAt = false;
    deck({ casa: 'auto', on: false });
    deck({ casa: 'fx', name: 'reset' });
    deck({ casa: 'overlay' });
    music.currentTime = 0;
    music.play().catch(() => {});
    rampMusic(MUSIC_BASE, 2500);
    run(START_AT);
  };

  document.getElementById('start').addEventListener('click', start);
  document.getElementById('replay').addEventListener('click', () => { stopAll(); start(); });
  document.getElementById('btnRestart').addEventListener('click', () => { stopAll(); start(); });

  let pausedAt = false;
  const togglePause = () => {
    if (!open.classList.contains('hidden') || endScreen.classList.contains('shown')) return;
    pausedAt = !pausedAt;
    document.body.classList.toggle('paused', pausedAt);
    if (pausedAt) { music.pause(); if (current) current.pause(); }
    else { music.play().catch(() => {}); if (current) current.play().catch(() => {}); }
  };
  document.getElementById('btnPause').addEventListener('click', togglePause);

  document.getElementById('btnSkip').addEventListener('click', () => {
    if (current) {
      const n = clips.indexOf(current);
      clearCues();
      if (n >= 0) (BLOCKS[n].cues || []).forEach(([, cmd]) => deck(cmd));
      current.pause();
      current.dispatchEvent(new Event('ended'));
    }
  });
  document.getElementById('btnSubs').addEventListener('click', () => document.body.classList.toggle('nosubs'));
  document.getElementById('btnFull').addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  });

  addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); togglePause(); }
    if (e.key === 'f' || e.key === 'F') document.getElementById('btnFull').click();
    if (e.key === 'Escape' && !pausedAt) togglePause();
  });

  /* barra visibile al movimento del mouse */
  let uiTimer = null;
  addEventListener('pointermove', () => {
    document.body.classList.add('ui');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => document.body.classList.remove('ui'), 2600);
  });
})();
</script>
</body>
</html>
